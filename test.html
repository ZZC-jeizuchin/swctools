<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVE-2026-8461 Test</title>
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #0f0; padding: 20px; }
    video { width: 100%; max-width: 640px; display: block; margin: 10px 0; }
    #log { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>CVE-2026-8461 (PixelSmash) Crash Test</h2>
  <p>If the video triggers the vulnerability, the WebView will <strong>crash immediately</strong>.</p>
  <video id="vid" autoplay controls width="640">
    <source src="baseline.avi" type="video/x-msvideo">
    Your browser does not support the video tag.
  </video>
  <pre id="log"></pre>

  <script>
    const log = document.getElementById('log');
    const vid = document.getElementById('vid');

    function addLog(msg) {
      log.textContent += msg + '\n';
    }

    vid.addEventListener('loadedmetadata', () => {
      addLog('Video metadata loaded – decoder accepted the file.');
    });

    vid.addEventListener('playing', () => {
      addLog('Video started playing.');
    });

    vid.addEventListener('error', (e) => {
      const err = vid.error;
      addLog(`Video error (code ${err.code}): ${err.message}`);
      if (err.code === MediaError.MEDIA_ERR_DECODE) {
        addLog('Decode error – file may be malformed or codec unsupported.');
      }
    });

    vid.addEventListener('abort', () => {
      addLog('Video loading aborted.');
    });

    // Detect crash: if page becomes unresponsive or the video tag disappears,
    // it means the decoder crashed. We can't log that, but the absence of further logs
    // after 'playing' indicates a likely crash.
    window.onerror = function(msg) {
      addLog('UNCAUGHT ERROR: ' + msg);
    };
  </script>
</body>
</html>
