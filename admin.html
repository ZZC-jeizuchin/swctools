<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - SwCTools</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #e8edf2; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; }
    #loginBox, #mainBox { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 900px; width: 90%; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
    button { padding: 10px 20px; background: #4f7f9e; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #3a6b8c; }
    h3 { cursor: pointer; color: #4f7f9e; text-decoration: underline; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; vertical-align: middle; }
    th { background: #f0f0f0; }
    .hash { font-family: monospace; font-size: 0.8em; word-break: break-all; }
    .avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #ccc; background: #eee; }
    .no-avatar { color: #999; font-size: 0.8em; }
  </style>
</head>
<body>
<div id="loginBox">
  <h3 onclick="location.href='index.html'">返回主站</h3>
  <h2>管理员验证</h2>
  <input type="password" id="adminPassInput" placeholder="请输入管理员密码">
  <button onclick="verifyAdmin()">验证</button>
  <p id="error" style="color:red;"></p>
</div>
<div id="mainBox" style="display:none;">
  <h3 onclick="location.href='index.html'">返回主站</h3>
  <h2>用户列表</h2>
  <table id="userTable">
    <thead>
      <tr>
        <th>头像</th>
        <th>用户名</th>
        <th>密码哈希</th>
        <th>注册时间</th>
        <th>最后登录</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
<script>
async function verifyAdmin() {
  const pass = document.getElementById('adminPassInput').value;
  if (!pass) return;
  try {
    const res = await fetch('/api/auth/admin-users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPass: pass })
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('mainBox').style.display = 'block';
    const tbody = document.querySelector('#userTable tbody');
    tbody.innerHTML = '';
    const token = localStorage.getItem('swc_token'); // 管理员 token

    data.users.forEach(user => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td class="avatar-cell">加载中…</td>
        <td>${user.username}</td>
        <td class="hash">${user.passwordHash}</td>
        <td>${new Date(user.createdAt).toLocaleString()}</td>
        <td>${user.lastLogin ? new Date(user.lastLogin).toLocaleString() : '从未登录'}</td>
      `;
      tbody.appendChild(row);

      if (token) {
        loadAvatarForUser(user.username, row.querySelector('.avatar-cell'), token);
      } else {
        row.querySelector('.avatar-cell').innerHTML = '<span class="no-avatar">无</span>';
      }
    });
  } catch(e) {
    document.getElementById('error').textContent = '密码错误或网络异常';
  }
}

async function loadAvatarForUser(username, td, token) {
  try {
    const res = await fetch(`/api/admin-get-icon?username=${encodeURIComponent(username)}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) {
      const blob = await res.blob();
      const img = document.createElement('img');
      img.className = 'avatar-img';
      img.src = URL.createObjectURL(blob);
      td.innerHTML = '';
      td.appendChild(img);
    } else {
      td.innerHTML = '<span class="no-avatar">无</span>';
    }
  } catch {
    td.innerHTML = '<span class="no-avatar">无</span>';
  }
}
</script>
</body>
</html>
