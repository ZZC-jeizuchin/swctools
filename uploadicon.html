<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>上传头像 - SwCTools</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css">
  <style>
    body {
      background: #e8edf2;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 24px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 { color: #1e4b6e; margin-bottom: 20px; }
    .source-section { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .source-section input[type="file"] { padding: 8px; }
    .url-input-row { display: flex; gap: 8px; }
    .url-input-row input {
      flex: 1; padding: 10px 14px; border: 1.5px solid #b3cce2;
      border-radius: 24px; font-size: 0.9rem; outline: none;
    }
    .url-input-row input:focus {
      border-color: #4f7fa3; box-shadow: 0 0 0 3px rgba(79,127,163,0.2);
    }
    .crop-container {
      width: 100%; max-height: 350px; margin: 16px 0;
      border-radius: 12px; overflow: hidden; background: #f0f0f0; display: none;
    }
    .crop-container img { max-width: 100%; display: block; }
    .current-avatar {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
      border: 2px solid #bdd1e6; margin-bottom: 8px;
    }
    .btn-row {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 12px;
    }
    button {
      background: #4f7f9e; border: none; color: white; padding: 10px 22px;
      border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
    }
    button:hover { background: #3a6b8c; }
    button.outline { background: transparent; color: #4f7f9e; border: 1.5px solid #4f7f9e; }
    button.outline:hover { background: #4f7f9e; color: white; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .message { margin-top: 12px; color: #173e58; font-size: 0.9rem; min-height: 1.2em; }
    .message.error { color: #c0392b; }
    .message.success { color: #27ae60; }
    .divider { border: none; border-top: 1px solid #e0e7ef; margin: 16px 0; }
  </style>
  <script>
    (function() {
      const token = localStorage.getItem('swc_token');
      let needLogin = true;
      if (token) {
        try {
          const parts = token.split('.');
          if (parts.length === 3) {
            // 安全解码 JWT payload（纯 ASCII，直接用 atob）
            const payload = JSON.parse(
              atob(parts[1].replace(/-/g, '+').replace(/_/g, '/'))
            );
            if (payload.exp && payload.exp < Math.floor(Date.now() / 1000)) {
              needLogin = true;
            } else {
              needLogin = false;
            }
          }
        } catch (e) { needLogin = true; }
      }
      if (needLogin) {
        const notRobot = localStorage.getItem('not_robot');
        if (notRobot !== '1') {
          window.location.href = 'antirobot.html';
        } else {
          localStorage.setItem('not_robot', '0');
        }
      }
    })();
  </script>
</head>
<body>
  <div class="container">
    <h2>上传头像</h2>
    <div>
      <img id="currentAvatar" class="current-avatar" src="#" alt="当前头像" style="display:none;">
      <p style="color:#666;font-size:0.85rem;">当前头像</p>
    </div>
    <hr class="divider">
    <div class="source-section">
      <input type="file" id="fileInput" accept="image/*">
      <div class="url-input-row">
        <input type="text" id="urlInput" placeholder="或输入图片URL加载…">
        <button class="outline" onclick="loadFromURL()">加载</button>
      </div>
    </div>
    <div class="crop-container" id="cropContainer">
      <img id="cropImage" src="#" alt="裁剪图片">
    </div>
    <div class="btn-row" id="actionButtons" style="display:none;">
      <button id="cropUploadBtn">裁剪并上传</button>
      <button class="outline" onclick="resetCrop()">重新选择</button>
    </div>
    <div class="message" id="message"></div>
    <hr class="divider">
    <button class="outline" onclick="window.location.href='index.html'">← 返回主站</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>
  <script>
    const token = localStorage.getItem('swc_token');
    const cropContainer = document.getElementById('cropContainer');
    const cropImage = document.getElementById('cropImage');
    const actionButtons = document.getElementById('actionButtons');
    const cropUploadBtn = document.getElementById('cropUploadBtn');
    const messageDiv = document.getElementById('message');
    const currentAvatar = document.getElementById('currentAvatar');
    const fileInput = document.getElementById('fileInput');
    const urlInput = document.getElementById('urlInput');
    let cropper = null;

    // 加载当前头像（添加时间戳破坏缓存）
    async function loadCurrentIcon() {
      if (!token) return;
      try {
        const url = `/api/upload-icon?t=${Date.now()}`;
        const res = await fetch(url, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          const blob = await res.blob();
          currentAvatar.src = URL.createObjectURL(blob);
          currentAvatar.style.display = 'inline-block';
        }
      } catch {}
    }

    // 初始化裁剪器，增加尺寸保护
    function initCropper(img) {
      const minSize = 50; // 图片小于50px时跳过裁剪
      if (img.naturalWidth < minSize || img.naturalHeight < minSize) {
        showMessage('图片尺寸过小，将直接使用原图上传', 'success');
        cropContainer.style.display = 'block';
        actionButtons.style.display = 'flex';
        cropImage._skipCrop = true;  // 标记跳过裁剪
        messageDiv.textContent = '点击“裁剪并上传”将使用原图';
        return;
      }

      if (cropper) { cropper.destroy(); cropper = null; }
      cropContainer.style.display = 'block';
      actionButtons.style.display = 'flex';
      messageDiv.textContent = '';
      delete cropImage._skipCrop;

      cropper = new Cropper(img, {
        aspectRatio: 1,
        viewMode: 1,
        autoCropArea: 0.8,
        minCropBoxWidth: 20,
        minCropBoxHeight: 20,
        responsive: true,
        guides: true,
        center: true,
        background: false,
        modal: true,
        movable: true,
        zoomable: true,
        rotatable: false,
        scalable: true
      });
    }

    // 文件选择事件
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        cropImage.src = ev.target.result;
        initCropper(cropImage);
      };
      reader.readAsDataURL(file);
      urlInput.value = '';
    });

    // 从 URL 加载图片
    window.loadFromURL = function() {
      const url = urlInput.value.trim();
      if (!url) {
        showMessage('请输入图片URL', 'error');
        return;
      }
      showMessage('正在加载图片…', '');
      // 对于 data: / blob: 直接使用，其他尝试设置 crossOrigin
      if (url.startsWith('data:') || url.startsWith('blob:')) {
        cropImage.removeAttribute('crossorigin');
      } else {
        cropImage.crossOrigin = 'anonymous';
      }
      cropImage.onload = () => {
        initCropper(cropImage);
        showMessage('图片加载成功，请调整裁剪框', 'success');
      };
      cropImage.onerror = () => {
        showMessage('图片加载失败，请检查URL或尝试其他图片', 'error');
      };
      cropImage.src = url;
      fileInput.value = '';
    };

    // 重置裁剪
    window.resetCrop = function() {
      if (cropper) { cropper.destroy(); cropper = null; }
      cropImage.src = '#';
      cropContainer.style.display = 'none';
      actionButtons.style.display = 'none';
      fileInput.value = '';
      urlInput.value = '';
      messageDiv.textContent = '';
      delete cropImage._skipCrop;
    };

    // 显示消息
    function showMessage(msg, type) {
      messageDiv.textContent = msg;
      messageDiv.className = 'message ' + (type || '');
    }

    // 裁剪并上传（增强错误显示）
    cropUploadBtn.addEventListener('click', async () => {
      if (!token) {
        showMessage('错误：未找到登录令牌，请重新登录', 'error');
        return;
      }
      cropUploadBtn.disabled = true;
      showMessage('正在上传…', '');

      try {
        let blob;

        // 如果之前标记为跳过裁剪（图片太小）
        if (cropImage._skipCrop) {
          showMessage('正在获取原图…', '');
          const resp = await fetch(cropImage.src);
          if (!resp.ok) {
            throw new Error('获取原图失败，状态码: ' + resp.status);
          }
          blob = await resp.blob();
        } else {
          if (!cropper) {
            showMessage('错误：裁剪器未初始化，请重新选择图片', 'error');
            return;
          }
          const canvas = cropper.getCroppedCanvas({ maxWidth: 512, maxHeight: 512 });
          if (!canvas || canvas.width === 0 || canvas.height === 0) {
            throw new Error('裁剪区域无效，请调整裁剪框后重试');
          }
          blob = await new Promise((resolve, reject) => {
            canvas.toBlob((b) => {
              if (b && b.size > 0) {
                resolve(b);
              } else {
                reject(new Error('导出图片失败，可能内存不足'));
              }
            }, 'image/png');
          });
        }

        const formData = new FormData();
        formData.append('icon', blob, 'avatar.png');

        const res = await fetch('/api/upload-icon', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
          body: formData
        });

        const resText = await res.text();
        let data;
        try {
          data = JSON.parse(resText);
        } catch {
          throw new Error('服务器返回异常（状态' + res.status + '）: ' + resText.substring(0, 100));
        }

        if (res.ok) {
          showMessage('头像上传成功！', 'success');
          loadCurrentIcon();
          resetCrop();
        } else {
          showMessage('上传失败：' + (data.error || '未知错误'), 'error');
        }
      } catch (err) {
        showMessage('上传出错：' + err.message, 'error');
      } finally {
        cropUploadBtn.disabled = false;
      }
    });

    // 页面加载时获取当前头像
    loadCurrentIcon();
  </script>
</body>
</html>
