<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>在线翻译 - SwCTools</title>
  <style>
    /* 亮色主题变量 */
    :root {
      --bg-body: #e8edf2;
      --panel-bg: rgba(255, 255, 255, 0.9);
      --panel-border: #bdd1e6;
      --title-color: #1e4b6e;
      --text-color: #173e58;
      --btn-bg: #4f7f9e;
      --btn-hover: #3a6b8c;
      --input-border: #b3cce2;
      --input-focus-border: #4f7fa3;
      --theme-btn-bg: #d9e8f4;
      --theme-btn-border: #adc7e0;
      --theme-btn-text: #1a4059;
    }

    /* 暗色主题变量 */
    [data-theme="dark"] {
      --bg-body: #0a0f14;
      --panel-bg: rgba(13, 27, 42, 0.9);
      --panel-border: #1e3a5a;
      --title-color: #a0c4e8;
      --text-color: #c0d8f0;
      --btn-bg: #2a6a9e;
      --btn-hover: #1a4a7a;
      --input-border: #2a5a8a;
      --input-focus-border: #5a9ac0;
      --theme-btn-bg: #1e3a5a;
      --theme-btn-border: #2a5a8a;
      --theme-btn-text: #c0d8f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

    body {
      background: var(--bg-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s;
      position: relative;
    }

    .translator-container {
      width: 100%;
      max-width: 900px;
      background: var(--panel-bg);
      border-radius: 28px;
      box-shadow: 0 16px 30px -8px rgba(30, 65, 90, 0.18);
      border: 1px solid var(--panel-border);
      padding: 28px;
      transition: background 0.3s, border-color 0.3s;
    }

    h1 {
      color: var(--title-color);
      font-weight: 550;
      font-size: 2rem;
      margin-bottom: 24px;
      text-align: center;
    }

    .theme-toggle {
      position: fixed;
      bottom: 12px;
      right: 16px;
      font-size: 0.9rem;
      background: var(--theme-btn-bg);
      border: 1px solid var(--theme-btn-border);
      color: var(--theme-btn-text);
      padding: 5px 14px;
      border-radius: 32px;
      cursor: pointer;
      opacity: 0.85;
      transition: 0.2s;
      z-index: 3000;
      font-weight: 500;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-toggle:hover { opacity: 1; }

    .lang-selectors {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .lang-selectors select {
      flex: 1;
      padding: 10px 16px;
      border: 1.5px solid var(--input-border);
      border-radius: 40px;
      background: var(--panel-bg);
      font-size: 0.95rem;
      outline: none;
      color: var(--text-color);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .lang-selectors select:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px rgba(79, 127, 163, 0.2);
    }

    .swap-btn {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--btn-bg);
      padding: 0 8px;
      transition: transform 0.15s;
    }

    .swap-btn:hover {
      transform: scale(1.2);
    }

    .translation-boxes {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 20px;
    }

    .text-area-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .text-area-group label {
      font-weight: 500;
      color: var(--title-color);
      font-size: 0.95rem;
    }

    .text-area-group textarea {
      width: 100%;
      padding: 16px;
      border: 1.5px solid var(--input-border);
      border-radius: 20px;
      background: var(--panel-bg);
      font-size: 1rem;
      line-height: 1.5;
      outline: none;
      color: var(--text-color);
      resize: vertical;
      min-height: 15em;
      font-family: 'Inter', system-ui, sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .text-area-group textarea:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px rgba(79, 127, 163, 0.2);
    }

    #outputText {
      background: var(--panel-bg);
    }

    .action-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .translate-btn, .back-btn {
      padding: 12px 28px;
      border-radius: 48px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border: none;
      white-space: nowrap;
    }

    .translate-btn {
      background: var(--btn-bg);
      color: white;
    }

    .translate-btn:hover {
      background: var(--btn-hover);
    }

    .back-btn {
      background: transparent;
      color: var(--btn-bg);
      border: 1.5px solid var(--btn-bg);
    }

    .back-btn:hover {
      background: var(--btn-bg);
      color: white;
    }

    .status-msg {
      text-align: center;
      margin-top: 12px;
      color: var(--text-color);
      font-size: 0.9rem;
      min-height: 1.2em;
      transition: color 0.2s;
    }

    @media (max-width: 600px) {
      .translator-container {
        padding: 20px;
      }
      .lang-selectors {
        flex-direction: column;
      }
      .action-row {
        flex-direction: column;
        gap: 8px;
      }
      .translate-btn, .back-btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- 深色模式切换按钮 -->
  <button class="theme-toggle" id="themeToggle" aria-label="切换深色模式">深色</button>

  <div class="translator-container">
    <h1>Swctoolsの在线Translation工具</h1>

    <div class="lang-selectors">
      <select id="sourceLang">
        <option value="zh">中文 (简体)</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ja-romaji">日本語 ローマ字 (罗马音)</option>
        <option value="ru">Русский</option>
        <option value="de">Deutsch</option>
      </select>

      <button class="swap-btn" id="swapLangBtn" title="交换语言">⇄</button>

      <select id="targetLang">
        <option value="en">English</option>
        <option value="zh">中文 (简体)</option>
        <option value="ja">日本語</option>
        <option value="ru">Русский</option>
        <option value="de">Deutsch</option>
      </select>
    </div>

    <div class="translation-boxes">
      <div class="text-area-group">
        <label for="inputText">原文</label>
        <textarea id="inputText" placeholder="请输入要翻译的文字..."></textarea>
      </div>
      <div class="text-area-group">
        <label for="outputText">译文</label>
        <textarea id="outputText" placeholder="翻译结果将显示在这里..." readonly></textarea>
      </div>
    </div>

    <div class="action-row">
      <button class="back-btn" onclick="window.location.href='index.html'">← 返回主站</button>
      <button class="translate-btn" id="translateBtn">翻译</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <script type="module">
    import { toHiragana } from "https://esm.sh/wanakana@5.3.1";

    // ================= 深色模式切换 =================
    const themeToggle = document.getElementById('themeToggle');
    const currentTheme = localStorage.getItem('translator_theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.textContent = currentTheme === 'light' ? '深色' : '亮色';

    themeToggle.addEventListener('click', () => {
      const newTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('translator_theme', newTheme);
      themeToggle.textContent = newTheme === 'light' ? '深色' : '亮色';
    });

    // ================= 翻译逻辑 =================
    const sourceLangSelect = document.getElementById('sourceLang');
    const targetLangSelect = document.getElementById('targetLang');
    const swapBtn = document.getElementById('swapLangBtn');
    const inputTextarea = document.getElementById('inputText');
    const outputTextarea = document.getElementById('outputText');
    const translateBtn = document.getElementById('translateBtn');
    const statusMsg = document.getElementById('statusMsg');

    sourceLangSelect.value = 'zh';
    targetLangSelect.value = 'en';

    sourceLangSelect.addEventListener('change', () => {
      if (sourceLangSelect.value === 'ja-romaji') {
        inputTextarea.placeholder = '请输入日语罗马音，例如：ohayou gozaimasu';
      } else {
        inputTextarea.placeholder = '请输入要翻译的文字...';
      }
    });

    swapBtn.addEventListener('click', () => {
      const sourceVal = sourceLangSelect.value;
      const targetVal = targetLangSelect.value;
      if (sourceVal === 'ja-romaji' || targetVal === 'ja-romaji') return;
      sourceLangSelect.value = targetVal;
      targetLangSelect.value = sourceVal;
      const inputText = inputTextarea.value;
      const outputText = outputTextarea.value;
      if (outputText.trim()) {
        inputTextarea.value = outputText;
        outputTextarea.value = '';
      }
    });

    async function performTranslation() {
      let text = inputTextarea.value.trim();
      if (!text) {
        statusMsg.textContent = '请输入要翻译的文字';
        return;
      }

      let src = sourceLangSelect.value;
      outputTextarea.value = '';
      statusMsg.textContent = '';

      // 罗马音 → 假名
      if (src === 'ja-romaji') {
        try {
          const hiragana = toHiragana(text, { IMEMode: true });
          if (!hiragana || hiragana === text || hiragana.replace(/\s/g, '') === text.replace(/\s/g, '')) {
            statusMsg.textContent = '罗马音转换失败，请检查拼写（例如：ohayou, teishishin 应写作 te i shi shi n）';
            return;
          }
          statusMsg.textContent = `已识别罗马音：${hiragana}`;
          inputTextarea.value = hiragana;
          text = hiragana;
          src = 'ja';
        } catch (err) {
          statusMsg.textContent = '罗马音转换出错：' + err.message;
          return;
        }
      }

      const tgt = targetLangSelect.value;
      // 添加邮箱参数以提高免费额度
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}&de=zzc540147@gmail.com`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.responseStatus === 200) {
          outputTextarea.value = data.responseData.translatedText;
        } else {
          statusMsg.textContent = '翻译失败：' + (data.responseDetails || '未知错误');
        }
      } catch (err) {
        statusMsg.textContent = '网络请求失败，请检查网络连接';
        console.error(err);
      }
    }

    translateBtn.addEventListener('click', performTranslation);
    inputTextarea.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        performTranslation();
      }
    });
  </script>
</body>
</html>
