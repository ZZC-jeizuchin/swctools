<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>在线翻译 - SwCTools</title>
  <style>
    :root {
      --bg-body: #e8edf2;
      --panel-bg: rgba(255, 255, 255, 0.9);
      --panel-border: #bdd1e6;
      --title-color: #1e4b6e;
      --text-color: #173e58;
      --btn-bg: #4f7f9e;
      --btn-hover: #3a6b8c;
      --input-border: #b3cce2;
      --input-focus-border: #4f7fa3;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

    body {
      background: var(--bg-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .translator-container {
      width: 100%;
      max-width: 900px;
      background: var(--panel-bg);
      border-radius: 28px;
      box-shadow: 0 16px 30px -8px rgba(30, 65, 90, 0.18);
      border: 1px solid var(--panel-border);
      padding: 28px;
    }

    h1 {
      color: var(--title-color);
      font-weight: 550;
      font-size: 2rem;
      margin-bottom: 24px;
      text-align: center;
    }

    .lang-selectors {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .lang-selectors select {
      flex: 1;
      padding: 10px 16px;
      border: 1.5px solid var(--input-border);
      border-radius: 40px;
      background: white;
      font-size: 0.95rem;
      outline: none;
      color: var(--text-color);
    }

    .lang-selectors select:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px rgba(79, 127, 163, 0.2);
    }

    .swap-btn {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--btn-bg);
      padding: 0 8px;
      transition: transform 0.15s;
    }

    .swap-btn:hover {
      transform: scale(1.2);
    }

    .translation-boxes {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 20px;
    }

    .text-area-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .text-area-group label {
      font-weight: 500;
      color: var(--title-color);
      font-size: 0.95rem;
    }

    .text-area-group textarea {
      width: 100%;
      padding: 16px;
      border: 1.5px solid var(--input-border);
      border-radius: 20px;
      background: white;
      font-size: 1rem;
      line-height: 1.5;
      outline: none;
      color: var(--text-color);
      resize: vertical;
      min-height: 15em;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .text-area-group textarea:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px rgba(79, 127, 163, 0.2);
    }

    #outputText {
      background: #f8fafd;
    }

    .action-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .translate-btn {
      background: var(--btn-bg);
      border: none;
      color: white;
      padding: 14px 36px;
      border-radius: 48px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .translate-btn:hover {
      background: var(--btn-hover);
    }

    .status-msg {
      text-align: center;
      margin-top: 12px;
      color: var(--text-color);
      font-size: 0.9rem;
      min-height: 1.2em;
    }

    @media (max-width: 600px) {
      .translator-container {
        padding: 20px;
      }
      .lang-selectors {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="translator-container">
    <h1>在线翻译</h1>

    <div class="lang-selectors">
      <select id="sourceLang">
        <option value="zh">中文 (简体)</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ja-romaji">日本語 ローマ字 (罗马音)</option>
        <option value="ru">Русский</option>
        <option value="de">Deutsch</option>
      </select>

      <button class="swap-btn" id="swapLangBtn" title="交换语言">⇄</button>

      <select id="targetLang">
        <option value="en">English</option>
        <option value="zh">中文 (简体)</option>
        <option value="ja">日本語</option>
        <option value="ru">Русский</option>
        <option value="de">Deutsch</option>
      </select>
    </div>

    <div class="translation-boxes">
      <div class="text-area-group">
        <label for="inputText">原文</label>
        <textarea id="inputText" placeholder="请输入要翻译的文字..."></textarea>
      </div>
      <div class="text-area-group">
        <label for="outputText">译文</label>
        <textarea id="outputText" placeholder="翻译结果将显示在这里..." readonly></textarea>
      </div>
    </div>

    <div class="action-row">
      <button class="translate-btn" id="translateBtn">翻译</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <script type="module">
    import { toHiragana } from "https://esm.sh/wanakana@5.3.1";

    const sourceLangSelect = document.getElementById('sourceLang');
    const targetLangSelect = document.getElementById('targetLang');
    const swapBtn = document.getElementById('swapLangBtn');
    const inputTextarea = document.getElementById('inputText');
    const outputTextarea = document.getElementById('outputText');
    const translateBtn = document.getElementById('translateBtn');
    const statusMsg = document.getElementById('statusMsg');

    sourceLangSelect.value = 'zh';
    targetLangSelect.value = 'en';

    // 动态修改输入框提示
    sourceLangSelect.addEventListener('change', () => {
      if (sourceLangSelect.value === 'ja-romaji') {
        inputTextarea.placeholder = '请输入日语罗马音，例如：ohayou gozaimasu';
      } else {
        inputTextarea.placeholder = '请输入要翻译的文字...';
      }
    });

    swapBtn.addEventListener('click', () => {
      const sourceVal = sourceLangSelect.value;
      const targetVal = targetLangSelect.value;
      // 罗马音不参与交换
      if (sourceVal === 'ja-romaji' || targetVal === 'ja-romaji') return;
      sourceLangSelect.value = targetVal;
      targetLangSelect.value = sourceVal;
      const inputText = inputTextarea.value;
      const outputText = outputTextarea.value;
      if (outputText.trim()) {
        inputTextarea.value = outputText;
        outputTextarea.value = '';
      }
    });

    async function performTranslation() {
      let text = inputTextarea.value.trim();
      if (!text) {
        statusMsg.textContent = '请输入要翻译的文字';
        return;
      }

      let src = sourceLangSelect.value;
      outputTextarea.value = '';
      statusMsg.textContent = '';

      // 罗马音 → 假名
      if (src === 'ja-romaji') {
        try {
          const hiragana = toHiragana(text, { IMEMode: true }); // 使用 IME 模式提高准确率
          // 如果转换结果与原文几乎一致，说明可能包含无法识别的组合
          if (!hiragana || hiragana === text || hiragana.replace(/\s/g, '') === text.replace(/\s/g, '')) {
            statusMsg.textContent = '罗马音转换失败，请检查拼写（例如：ohayou, teishishin 应写作 te i shi shi n）';
            return;
          }
          // 展示转换结果，并将输入框内容替换为假名，以便用户确认
          statusMsg.textContent = `已识别罗马音：${hiragana}`;
          inputTextarea.value = hiragana;  // 让用户看到转换后的假名
          text = hiragana;
          src = 'ja';
        } catch (err) {
          statusMsg.textContent = '罗马音转换出错：' + err.message;
          return;
        }
      }

      const tgt = targetLangSelect.value;

      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.responseStatus === 200) {
          outputTextarea.value = data.responseData.translatedText;
        } else {
          statusMsg.textContent = '翻译失败：' + (data.responseDetails || '未知错误');
        }
      } catch (err) {
        statusMsg.textContent = '网络请求失败，请检查网络连接';
        console.error(err);
      }
    }

    translateBtn.addEventListener('click', performTranslation);
    inputTextarea.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        performTranslation();
      }
    });
  </script>
</body>
</html>
