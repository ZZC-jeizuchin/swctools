<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>网页代理 - SwCTools</title>
  <style>
    :root {
      --bg-body: #e8edf2;
      --panel-bg: rgba(255, 255, 255, 0.9);
      --panel-border: #bdd1e6;
      --title-color: #1e4b6e;
      --text-color: #173e58;
      --btn-bg: #4f7f9e;
      --btn-hover: #3a6b8c;
      --input-border: #b3cce2;
      --input-focus-border: #4f7fa3;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

    body {
      background: var(--bg-body);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: var(--panel-bg);
      border-radius: 28px;
      box-shadow: 0 16px 30px -8px rgba(30, 65, 90, 0.18);
      border: 1px solid var(--panel-border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    h1 {
      color: var(--title-color);
      font-weight: 550;
      font-size: 2rem;
      margin-bottom: 16px;
      text-align: center;
    }

    .url-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .url-bar input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--input-border);
      border-radius: 40px;
      background: var(--panel-bg);
      font-size: 1rem;
      outline: none;
      color: var(--text-color);
    }

    .url-bar input:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px rgba(79, 127, 163, 0.2);
    }

    .btn {
      padding: 12px 28px;
      border-radius: 48px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .go-btn {
      background: var(--btn-bg);
      color: white;
    }

    .go-btn:hover { background: var(--btn-hover); }

    .back-btn {
      background: transparent;
      color: var(--btn-bg);
      border: 1.5px solid var(--btn-bg);
    }

    .back-btn:hover { background: var(--btn-bg); color: white; }

    .iframe-container {
      flex: 1;
      width: 100%;
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      overflow: hidden;
      background: white;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .error-message {
      color: #c0392b;
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .container { padding: 16px; }
      .url-bar { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>网页代理</h1>

    <div class="url-bar">
      <input type="text" id="urlInput" placeholder="输入网址，例如 https://example.com" value="">
      <button class="btn go-btn" id="goBtn">前往</button>
      <button class="btn back-btn" onclick="window.location.href='index.html'">← 返回主站</button>
    </div>

    <div class="iframe-container">
      <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" loading="lazy"></iframe>
    </div>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const goBtn = document.getElementById('goBtn');
    const proxyFrame = document.getElementById('proxyFrame');

    function navigate() {
      let url = urlInput.value.trim();
      if (!url) return;
      // 自动补全 https:// 如果没写协议
      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
        urlInput.value = url;
      }
      // 通过我们的代理函数加载
      const proxyUrl = '/api/vpn?url=' + encodeURIComponent(url);
      proxyFrame.src = proxyUrl;
    }

    goBtn.addEventListener('click', navigate);
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') navigate();
    });

    // 可选：监听 iframe 加载错误
    proxyFrame.addEventListener('error', () => {
      console.warn('iframe 加载失败');
    });
  </script>
</body>
</html>
