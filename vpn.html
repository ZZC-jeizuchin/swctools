<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>网页代理 - SwCTools</title>
  <style>
    :root {
      --bg-body: #e8edf2;
      --panel-bg: rgba(255, 255, 255, 0.9);
      --panel-border: #bdd1e6;
      --title-color: #1e4b6e;
      --text-color: #173e58;
      --btn-bg: #4f7f9e;
      --btn-hover: #3a6b8c;
      --input-border: #b3cce2;
      --input-focus-border: #4f7fa3;
      --selector-bg: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

    body {
      background: var(--bg-body);
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      background: var(--panel-bg);
      border-radius: 24px;
      box-shadow: 0 12px 28px -6px rgba(30, 65, 90, 0.15);
      border: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 550;
      color: var(--title-color);
      white-space: nowrap;
      margin-right: 10px;
    }

    .nav-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .nav-row input {
      flex: 3 1 200px;
      padding: 10px 16px;
      border: 1.5px solid var(--input-border);
      border-radius: 36px;
      background: var(--panel-bg);
      font-size: 0.95rem;
      outline: none;
      color: var(--text-color);
    }

    .nav-row input:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px rgba(79, 127, 163, 0.2);
    }

    .nav-row select {
      flex: 0 1 auto;
      padding: 10px 12px;
      border: 1.5px solid var(--input-border);
      border-radius: 36px;
      background: var(--selector-bg);
      font-size: 0.9rem;
      outline: none;
      color: var(--text-color);
      cursor: pointer;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 36px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      background: var(--btn-bg);
      color: white;
    }

    .btn:hover { background: var(--btn-hover); }

    .btn-outline {
      background: transparent;
      color: var(--btn-bg);
      border: 1.5px solid var(--btn-bg);
    }

    .btn-outline:hover {
      background: var(--btn-bg);
      color: white;
    }

    .iframe-wrapper {
      flex: 1;
      width: 100%;
      background: white;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    @media (max-width: 700px) {
      .header { padding: 12px 14px 10px; }
      .header h1 { font-size: 1.3rem; }
      .btn { padding: 8px 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌐 网页代理</h1>
      <div class="nav-row">
        <input type="text" id="urlInput" placeholder="输入网址或搜索关键词">
        <select id="engineSelect">
          <option value="baidu">百度</option>
          <option value="google">Google</option>
          <option value="bing">Bing</option>
          <option value="duckduckgo">DuckDuckGo</option>
        </select>
        <button class="btn" id="goBtn">打开</button>
        <button class="btn" id="searchBtn">搜索</button>
        <button class="btn btn-outline" onclick="window.location.href='index.html'">← 返回</button>
      </div>
    </div>
    <div class="iframe-wrapper">
      <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const engineSelect = document.getElementById('engineSelect');
    const goBtn = document.getElementById('goBtn');
    const searchBtn = document.getElementById('searchBtn');
    const proxyFrame = document.getElementById('proxyFrame');

    // 搜索引擎 URL 模板
    const searchEngines = {
      baidu: 'https://www.baidu.com/s?wd=',
      google: 'https://www.google.com/search?q=',
      bing: 'https://www.bing.com/search?q=',
      duckduckgo: 'https://duckduckgo.com/?q='
    };

    // 加载指定 URL 到 iframe（通过我们的代理）
    function loadUrl(rawUrl) {
      let finalUrl = rawUrl.trim();
      if (!finalUrl) return;

      // 自动补全协议
      if (!/^https?:\/\//i.test(finalUrl)) {
        finalUrl = 'https://' + finalUrl;
      }

      // 更新输入框（让用户看到完整地址）
      urlInput.value = finalUrl;

      // 通过代理加载
      proxyFrame.src = '/api/vpn?url=' + encodeURIComponent(finalUrl);
    }

    // 直接打开（将输入视为网址）
    goBtn.addEventListener('click', () => {
      loadUrl(urlInput.value);
    });

    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        // 如果按了回车，默认当作网址打开（和“打开”按钮一样）
        loadUrl(urlInput.value);
      }
    });

    // 搜索：用关键词拼接搜索引擎 URL
    searchBtn.addEventListener('click', () => {
      const keyword = urlInput.value.trim();
      if (!keyword) return;

      const engine = engineSelect.value;
      const baseUrl = searchEngines[engine];
      const searchUrl = baseUrl + encodeURIComponent(keyword);

      loadUrl(searchUrl);
    });
  </script>
</body>
</html>
