<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>swctools.pages.dev · 反机器爬虫程序</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    :root {
      --bg-body: #e8edf2;
      --panel-bg: rgba(255, 255, 255, 0.85);
      --panel-border: #bdd1e6;
      --title-color: #1e4b6e;
      --text-color: #173e58;
      --corner-text-color: #3a6a8e;
      --fps-bg: rgba(255, 255, 255, 0.6);
    }
    [data-theme="dark"] {
      --bg-body: #0a0f14;
      --panel-bg: rgba(13, 27, 42, 0.9);
      --panel-border: #1e3a5a;
      --title-color: #a0c4e8;
      --text-color: #c0d8f0;
      --corner-text-color: #7a9ab0;
      --fps-bg: rgba(0, 0, 0, 0.5);
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',system-ui,sans-serif; }
    body {
      background:var(--bg-body); min-height:100vh; display:flex;
      align-items:center; justify-content:center; padding:12px;
      position:relative; overflow:hidden;
    }

    .corner-tl {
      position:fixed; top:12px; left:16px; font-size:0.75rem;
      color:var(--corner-text-color); opacity:0.8; z-index:3000; pointer-events:none;
    }
    .corner-tr {
      position:fixed; top:12px; right:20px; font-size:0.75rem;
      color:var(--corner-text-color); opacity:0.8; z-index:3000; pointer-events:none;
      background:var(--fps-bg); padding:4px 12px; border-radius:24px;
      border:1px solid var(--panel-border);
    }
    .corner-br {
      position:fixed; bottom:12px; right:20px; font-size:0.75rem;
      color:var(--corner-text-color); opacity:0.8; z-index:3000; pointer-events:none;
    }
    .theme-toggle {
      position:fixed; bottom:12px; left:16px; font-size:0.9rem;
      background:var(--btn-bg, #d9e8f4);
      border:1px solid var(--panel-border); color:var(--corner-text-color);
      padding:5px 14px; border-radius:32px; cursor:pointer; opacity:0.85;
      transition:0.2s; z-index:3000; font-weight:500;
      -webkit-tap-highlight-color:transparent;
    }
    .theme-toggle:hover { opacity:1; background:var(--btn-hover-bg, #c2d8ed); }

    .main-panel {
      max-width:580px; width:100%; background:var(--panel-bg);
      border-radius:28px; box-shadow:0 16px 30px -8px rgba(30,65,90,0.18);
      border:1px solid var(--panel-border); padding:40px 36px;
      display:flex; flex-direction:column; align-items:center; text-align:center;
      overflow:visible; position:relative; z-index:1;
    }

    .main-panel h1 {
      font-weight:550; font-size:1.9rem; color:var(--title-color);
      margin-bottom:8px;
    }
    .main-panel .subtitle {
      font-size:1.2rem; color:var(--text-color); opacity:0.7;
      margin-bottom:10px;
    }

    /* 初始提示语 */
    .initial-message {
      font-size:1.1rem; color:var(--text-color); opacity:0.9;
      margin-bottom:20px; line-height:1.6; font-weight:500;
    }

    /* 智商数字区域 */
    .iq-score-container {
      margin-bottom: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .iq-label {
      font-size: 0.9rem;
      color: var(--corner-text-color);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .iq-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--text-color);
      line-height: 1;
      transition: color 0.3s;
    }
    .iq-score.danger {
      color: #c62828;   /* 低智商红色 */
    }
    .iq-score.safe {
      color: #2e7d32;   /* 高智商绿色 */
    }

    .turnstile-wrapper {
      display: flex; justify-content: center;
      overflow: visible; padding: 10px 0;
      margin-bottom: 12px; width: 100%;
    }
    .turnstile-wrapper .cf-turnstile {
      transform: scale(1.35); transform-origin: center;
    }

    /* 结果区域 */
    .result-area {
      display: none;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      width: 100%;
      gap: 20px;
      flex-wrap: wrap;
    }
    .result-area.show { display: flex; }

    .result-logo {
      width: 100px; height: auto;
      transform: scale(0);
      transform-origin: 75% 50%;
      flex-shrink: 0;
      position: relative;
      z-index: auto;
    }
    .result-logo.boom {
      animation: logoBoom 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    @keyframes logoBoom {
      0%   { transform: scale(0); }
      50%  { transform: scale(20); }
      100% { transform: scale(1); }
    }

    .result-text-area {
      display: flex; flex-direction: column;
      align-items: flex-start; text-align: left;
      min-width: 180px;
      margin-top: -16px;
    }
    .result-message {
      font-size: 1.1rem; font-weight: 600;
      margin-bottom: 10px; color: var(--text-color);
    }
    .result-message.success-text { color: #2e7d32; }
    .result-message.failure-text { color: #c62828; }

    .result-retry-btn {
      background: #f48120; color: white;
      border: none; padding: 10px 28px;
      border-radius: 32px; font-size: 0.95rem;
      cursor: pointer; transition: background 0.2s;
      display: none;
    }
    .result-retry-btn.show { display: inline-block; }
    .result-retry-btn:hover { background: #e06d10; }

    .flying-cf {
      position: fixed; width: 80px; height: auto;
      z-index: 9999; pointer-events: none; opacity: 0.9;
    }
  </style>
</head>
<body>
<div class="corner-tl">不自由毋宁死 · Give me liberty or give me death</div>
<div class="corner-tr" id="fpsDisplay">FPS: --</div>
<div class="corner-br">made by ZZC-jeizuchin, Github</div>
<button class="theme-toggle" id="themeToggle">深色</button>

<div class="main-panel">
  <h1>swctools.pages.dev</h1>
  <p class="subtitle">反机器爬虫程序</p>

  <div class="initial-message" id="initialMsg">
    你个小可爱人类快点来证明你比没浮木的爬虫机器人聪明，不然别想进我的网站。<br>
    证明你不是一只机械晚期智人
  </div>

  <!-- 智商显示区域 -->
  <div class="iq-score-container">
    <span class="iq-label">你的智商（满分100）：</span>
    <div class="iq-score" id="iqScore">--</div>
  </div>

  <div class="turnstile-wrapper">
    <div class="cf-turnstile" id="cf-widget"
         data-sitekey="0x4AAAAAADTIOg1WHw9YWQcn"
         data-callback="onSuccess"
         data-error-callback="onFailure"
         data-expired-callback="onFailure"
         data-timeout-callback="onFailure">
    </div>
  </div>

  <div class="result-area" id="resultArea">
    <img class="result-logo" id="resultLogo" src="https://www.cloudflare.com/img/logo-cloudflare.svg" alt="Cloudflare">
    <div class="result-text-area">
      <div class="result-message" id="resultMessage"></div>
      <button class="result-retry-btn" id="retryBtn">再试一次</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // 主题
    const themeToggle = document.getElementById('themeToggle');
    const currentTheme = localStorage.getItem('swc_theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.textContent = currentTheme === 'light' ? '深色' : '亮色';
    themeToggle.addEventListener('click', () => {
      const newTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('swc_theme', newTheme);
      themeToggle.textContent = newTheme === 'light' ? '深色' : '亮色';
    });

    // FPS
    const fpsDisplay = document.getElementById('fpsDisplay');
    let frameCount = 0, lastFpsUpdate = performance.now();
    function updateFPS() {
      frameCount++;
      const now = performance.now();
      if(now - lastFpsUpdate >= 1000) {
        fpsDisplay.textContent = `FPS: ${Math.round((frameCount * 1000) / (now - lastFpsUpdate))}`;
        frameCount = 0; lastFpsUpdate = now;
      }
      requestAnimationFrame(updateFPS);
    }
    requestAnimationFrame(updateFPS);

    // 智商显示元素
    const iqScoreEl = document.getElementById('iqScore');
    let iqAnimationInterval = null;

    // 获取真实 Bot Score（来自 Pages Functions）
    async function fetchRealBotScore() {
      try {
        const res = await fetch('/api/bot-score');
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        if (typeof data.botScore === 'number') {
          return data.botScore;
        }
      } catch (e) {
        console.warn('Failed to fetch real bot score, using fallback.');
      }
      return null;
    }

    // 停止数字波动并固定为指定值
    function stopIqAnimation(value) {
      if (iqAnimationInterval) {
        clearInterval(iqAnimationInterval);
        iqAnimationInterval = null;
      }
      iqScoreEl.textContent = value;
      iqScoreEl.classList.remove('danger', 'safe');
      if (value >= 80) {
        iqScoreEl.classList.add('safe');   // 高智商绿色
      } else {
        iqScoreEl.classList.add('danger'); // 低智商红色
      }
    }

    // 开始随机波动
    function startRandomAnimation() {
      if (iqAnimationInterval) clearInterval(iqAnimationInterval);
      iqScoreEl.classList.remove('danger', 'safe');
      iqAnimationInterval = setInterval(() => {
        iqScoreEl.textContent = Math.floor(Math.random() * 101);
      }, 80);
    }

    // 初始化智商显示
    async function initIqDisplay() {
      const score = await fetchRealBotScore();
      if (score !== null) {
        stopIqAnimation(score);
      } else {
        startRandomAnimation();
      }
    }

    // 验证后更新智商（真实优先，失败时低分，成功时高分）
    async function updateIqAfterVerification(isSuccess) {
      const score = await fetchRealBotScore();
      if (score !== null) {
        stopIqAnimation(score);
      } else {
        // 模拟值：成功则80-99，失败则1-10
        const fakeScore = isSuccess ? Math.floor(Math.random() * 20) + 80 : Math.floor(Math.random() * 10) + 1;
        stopIqAnimation(fakeScore);
      }
    }

    // 页面加载时初始化
    initIqDisplay();

    // 结果区域元素
    const resultArea = document.getElementById('resultArea');
    const resultMessage = document.getElementById('resultMessage');
    const retryBtn = document.getElementById('retryBtn');
    const resultLogo = document.getElementById('resultLogo');

    // 飞行图标
    let flyingTimers = [];
    function clearFlyingLogos() {
      document.querySelectorAll('.flying-cf').forEach(el => el.remove());
      flyingTimers.forEach(t => clearInterval(t));
      flyingTimers = [];
    }
    function spawnFlyingLogos(count = 10) {
      clearFlyingLogos();
      const body = document.body;
      for (let i = 0; i < count; i++) {
        const img = document.createElement('img');
        img.src = 'https://www.cloudflare.com/img/logo-cloudflare.svg';
        img.className = 'flying-cf';
        const startX = Math.random() * (window.innerWidth - 80);
        const startY = Math.random() * (window.innerHeight - 80);
        img.style.left = startX + 'px';
        img.style.top = startY + 'px';
        body.appendChild(img);
        let vx = (Math.random() - 0.5) * 40;
        let vy = (Math.random() - 0.5) * 40;
        const timer = setInterval(() => {
          let l = parseFloat(img.style.left) || startX;
          let t = parseFloat(img.style.top) || startY;
          if (l <= 0 || l >= window.innerWidth - 80) vx *= -1;
          if (t <= 0 || t >= window.innerHeight - 80) vy *= -1;
          img.style.left = (l + vx) + 'px';
          img.style.top = (t + vy) + 'px';
        }, 40);
        flyingTimers.push(timer);
        setTimeout(() => {
          img.style.transition = 'opacity 0.5s';
          img.style.opacity = '0';
          setTimeout(() => img.remove(), 500);
        }, 3000);
      }
      setTimeout(clearFlyingLogos, 3500);
    }

    function onAnimationEnd(e) {
      if (e.target === resultLogo && resultLogo.classList.contains('boom')) {
        resultLogo.style.transform = 'scale(1)';
        resultLogo.style.position = '';
        resultLogo.style.left = '';
        resultLogo.style.top = '';
        resultLogo.style.zIndex = '';
        resultLogo.classList.remove('boom');
        resultLogo.removeEventListener('animationend', onAnimationEnd);
      }
    }

    async function showResult(message, isSuccess) {
      // 更新智商分数
      await updateIqAfterVerification(isSuccess);

      resultMessage.textContent = message;
      resultMessage.className = 'result-message ' + (isSuccess ? 'success-text' : 'failure-text');
      retryBtn.classList.toggle('show', !isSuccess);

      const logo = resultLogo;
      const w = logo.offsetWidth || 100;
      const h = logo.offsetHeight || 100;
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const anchorX = w * 0.75;
      const anchorY = h * 0.5;

      logo.style.position = 'fixed';
      logo.style.left = (centerX - anchorX) + 'px';
      logo.style.top = (centerY - anchorY) + 'px';
      logo.style.zIndex = '10000';

      logo.classList.remove('boom');
      void logo.offsetWidth;
      logo.addEventListener('animationend', onAnimationEnd);
      logo.classList.add('boom');

      resultArea.classList.add('show');
      spawnFlyingLogos(10);
    }

    function hideResult() {
      resultLogo.removeEventListener('animationend', onAnimationEnd);
      resultLogo.classList.remove('boom');
      resultLogo.style.transform = '';
      resultLogo.style.position = '';
      resultLogo.style.left = '';
      resultLogo.style.top = '';
      resultLogo.style.zIndex = '';

      resultArea.classList.remove('show');
      clearFlyingLogos();

      // 重试时重新获取真实评分，若失败则恢复波动
      initIqDisplay();
      try { turnstile.reset('#cf-widget'); } catch(e) {}
    }

    retryBtn.addEventListener('click', hideResult);

    function getRedirectUrl() {
      const params = new URLSearchParams(window.location.search);
      const redirectParam = params.get('redirect');
      if (redirectParam && (redirectParam.startsWith('/') || redirectParam.startsWith('./'))) {
        return redirectParam;
      }
      if (document.referrer) {
        try {
          const referrerUrl = new URL(document.referrer);
          if (referrerUrl.hostname === 'swctools.pages.dev') {
            return referrerUrl.pathname + referrerUrl.search + referrerUrl.hash;
          }
        } catch(e) {}
      }
      return '/index.html';
    }

    // Turnstile 回调
    window.onSuccess = function(token) {
      localStorage.setItem('not_robot', '1');
      showResult('你打败了cloudflare的土豆服务器人机验证，看来你的大脑比cpu好使', true);
      setTimeout(() => {
        window.location.href = getRedirectUrl();
      }, 1989);
    };

    window.onFailure = function() {
      showResult('这个地球已经没有人类了，你是伪人么?你的健康状况是大脑萎缩小脑缺失或者变成硅基生物二选一', false);
    };
  })();
</script>
</body>
</html>
