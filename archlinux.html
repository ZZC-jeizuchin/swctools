<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SwC Linux 终端</title>
  <style>
    body {
      margin: 0;
      background: #1a1e2b;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }
    #log-panel {
      background: #0d1117;
      color: #c9d1d9;
      flex: 0 0 80px;
      overflow-y: auto;
      padding: 6px 10px;
      border-bottom: 2px solid #2a3a4a;
      font-size: 0.7rem;
      line-height: 1.3;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-item { margin-bottom: 2px; }
    .log-error { color: #f85149; }
    .log-success { color: #3fb950; }
    .log-info { color: #58a6ff; }
    .log-debug { color: #aaa; }

    #screen-container {
      flex: 1;
      position: relative;
      background: #000;
      min-height: 200px;
      overflow: hidden;
    }
    #screen {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 浮动键盘 */
    #keyboard {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(42, 46, 59, 0.95);
      backdrop-filter: blur(5px);
      padding: 8px 6px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      z-index: 100;
      min-width: 320px;
      max-width: 95vw;
      touch-action: none;
    }
    .keyboard-header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2px 0 4px;
      cursor: grab;
    }
    .keyboard-header:active {
      cursor: grabbing;
    }
    .drag-handle {
      width: 40px;
      height: 6px;
      background: #5a5e6b;
      border-radius: 3px;
    }
    .key-row {
      display: flex;
      justify-content: center;
      gap: 3px;
      flex-wrap: nowrap;
    }
    .key-btn {
      background: #3a3e4b;
      border: 1px solid #5a5e6b;
      color: #e0e0e0;
      padding: 10px 4px;
      border-radius: 5px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s;
      flex: 0 0 auto;
      min-width: 22px;
      touch-action: manipulation;
    }
    .key-btn:active {
      background: #5a5e7b;
    }
    .key-btn.wide {
      min-width: 45px;
    }
    .key-btn.space {
      flex: 1;
      min-width: 70px;
    }
    .key-btn.active {
      background: #6a8e4b;
      border-color: #8ab86a;
    }
    .key-btn.highlight {
      background: #4a6e8b;
    }
  </style>
</head>
<body>
<div id="log-panel">
  <div class="log-item log-info">[系统] 初始化中...</div>
</div>
<div id="screen-container">
  <div id="screen"></div>
</div>
<div id="keyboard">
  <div class="keyboard-header" id="dragHandle">
    <div class="drag-handle"></div>
  </div>
  <!-- 键盘由JS动态生成 -->
</div>

<script src="https://cdn.jsdelivr.net/npm/v86@latest/build/libv86.js"></script>
<script>
(function() {
  const logPanel = document.getElementById('log-panel');
  const screenDiv = document.getElementById('screen');
  const keyboardDiv = document.getElementById('keyboard');
  const dragHandle = document.getElementById('dragHandle');

  function log(msg, type = 'info') {
    const item = document.createElement('div');
    item.className = `log-item log-${type}`;
    item.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logPanel.appendChild(item);
    logPanel.scrollTop = logPanel.scrollHeight;
  }

  if (typeof V86 === 'undefined') { log('V86 库加载失败', 'error'); return; }
  log('V86 库加载成功', 'success');

  const config = {
    screen_container: screenDiv,
    bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/seabios.bin" },
    vga_bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/vgabios.bin" },
    cdrom: { url: "https://cdn.jsdelivr.net/gh/copy/images@master/linux.iso" },
    wasm_path: "https://cdn.jsdelivr.net/npm/v86@latest/build/v86.wasm",
    autostart: true,
    disable_keyboard: false,
    disable_speaker: true,
    acpi: true,
  };

  let emulator;
  try {
    emulator = new V86(config);
    log('模拟器实例已创建', 'success');
  } catch (e) {
    log('创建模拟器实例失败: ' + e.message, 'error');
    return;
  }

  emulator.add_listener("emulator-loaded", () => {
    log('模拟器已启动！命令行就绪。', 'success');
    log('拖动键盘顶部手柄移动位置', 'info');
  });
  emulator.add_listener("error", (e) => log('模拟器错误: ' + (e.message || e), 'error'));

  // ========== 虚拟键盘定义 ==========
  const keyRows = [
    // 第一行：数字/符号
    [
      {label:'`', shiftLabel:'~', code:'Backquote', key:'`', shiftKey:'~', keyCode:192},
      {label:'1', shiftLabel:'!', code:'Digit1', key:'1', shiftKey:'!', keyCode:49},
      {label:'2', shiftLabel:'@', code:'Digit2', key:'2', shiftKey:'@', keyCode:50},
      {label:'3', shiftLabel:'#', code:'Digit3', key:'3', shiftKey:'#', keyCode:51},
      {label:'4', shiftLabel:'$', code:'Digit4', key:'4', shiftKey:'$', keyCode:52},
      {label:'5', shiftLabel:'%', code:'Digit5', key:'5', shiftKey:'%', keyCode:53},
      {label:'6', shiftLabel:'^', code:'Digit6', key:'6', shiftKey:'^', keyCode:54},
      {label:'7', shiftLabel:'&', code:'Digit7', key:'7', shiftKey:'&', keyCode:55},
      {label:'8', shiftLabel:'*', code:'Digit8', key:'8', shiftKey:'*', keyCode:56},
      {label:'9', shiftLabel:'(', code:'Digit9', key:'9', shiftKey:'(', keyCode:57},
      {label:'0', shiftLabel:')', code:'Digit0', key:'0', shiftKey:')', keyCode:48},
      {label:'-', shiftLabel:'_', code:'Minus', key:'-', shiftKey:'_', keyCode:173},
      {label:'=', shiftLabel:'+', code:'Equal', key:'=', shiftKey:'+', keyCode:61},
      {label:'⌫', shiftLabel:'⌫', code:'Backspace', key:'Backspace', keyCode:8, wide:true}
    ],
    // 第二行：QWERTY
    [
      {label:'Tab', code:'Tab', key:'Tab', keyCode:9, wide:true},
      {label:'q', shiftLabel:'Q', code:'KeyQ', key:'q', shiftKey:'Q', keyCode:81},
      {label:'w', shiftLabel:'W', code:'KeyW', key:'w', shiftKey:'W', keyCode:87},
      {label:'e', shiftLabel:'E', code:'KeyE', key:'e', shiftKey:'E', keyCode:69},
      {label:'r', shiftLabel:'R', code:'KeyR', key:'r', shiftKey:'R', keyCode:82},
      {label:'t', shiftLabel:'T', code:'KeyT', key:'t', shiftKey:'T', keyCode:84},
      {label:'y', shiftLabel:'Y', code:'KeyY', key:'y', shiftKey:'Y', keyCode:89},
      {label:'u', shiftLabel:'U', code:'KeyU', key:'u', shiftKey:'U', keyCode:85},
      {label:'i', shiftLabel:'I', code:'KeyI', key:'i', shiftKey:'I', keyCode:73},
      {label:'o', shiftLabel:'O', code:'KeyO', key:'o', shiftKey:'O', keyCode:79},
      {label:'p', shiftLabel:'P', code:'KeyP', key:'p', shiftKey:'P', keyCode:80},
      {label:'[', shiftLabel:'{', code:'BracketLeft', key:'[', shiftKey:'{', keyCode:219},
      {label:']', shiftLabel:'}', code:'BracketRight', key:']', shiftKey:'}', keyCode:221},
      {label:'\\', shiftLabel:'|', code:'Backslash', key:'\\', shiftKey:'|', keyCode:220}
    ],
    // 第三行：ASDF
    [
      {label:'Caps', code:'CapsLock', key:'CapsLock', keyCode:20, wide:true, caps:true},
      {label:'a', shiftLabel:'A', code:'KeyA', key:'a', shiftKey:'A', keyCode:65},
      {label:'s', shiftLabel:'S', code:'KeyS', key:'s', shiftKey:'S', keyCode:83},
      {label:'d', shiftLabel:'D', code:'KeyD', key:'d', shiftKey:'D', keyCode:68},
      {label:'f', shiftLabel:'F', code:'KeyF', key:'f', shiftKey:'F', keyCode:70},
      {label:'g', shiftLabel:'G', code:'KeyG', key:'g', shiftKey:'G', keyCode:71},
      {label:'h', shiftLabel:'H', code:'KeyH', key:'h', shiftKey:'H', keyCode:72},
      {label:'j', shiftLabel:'J', code:'KeyJ', key:'j', shiftKey:'J', keyCode:74},
      {label:'k', shiftLabel:'K', code:'KeyK', key:'k', shiftKey:'K', keyCode:75},
      {label:'l', shiftLabel:'L', code:'KeyL', key:'l', shiftKey:'L', keyCode:76},
      {label:';', shiftLabel:':', code:'Semicolon', key:';', shiftKey:':', keyCode:186},
      {label:"'", shiftLabel:'"', code:'Quote', key:"'", shiftKey:'"', keyCode:222},
      {label:'Enter', code:'Enter', key:'Enter', keyCode:13, wide:true}
    ],
    // 第四行：ZXCV
    [
      {label:'Shift', code:'ShiftLeft', key:'Shift', keyCode:16, wide:true, shift:true},
      {label:'z', shiftLabel:'Z', code:'KeyZ', key:'z', shiftKey:'Z', keyCode:90},
      {label:'x', shiftLabel:'X', code:'KeyX', key:'x', shiftKey:'X', keyCode:88},
      {label:'c', shiftLabel:'C', code:'KeyC', key:'c', shiftKey:'C', keyCode:67},
      {label:'v', shiftLabel:'V', code:'KeyV', key:'v', shiftKey:'V', keyCode:86},
      {label:'b', shiftLabel:'B', code:'KeyB', key:'b', shiftKey:'B', keyCode:66},
      {label:'n', shiftLabel:'N', code:'KeyN', key:'n', shiftKey:'N', keyCode:78},
      {label:'m', shiftLabel:'M', code:'KeyM', key:'m', shiftKey:'M', keyCode:77},
      {label:',', shiftLabel:'<', code:'Comma', key:',', shiftKey:'<', keyCode:188},
      {label:'.', shiftLabel:'>', code:'Period', key:'.', shiftKey:'>', keyCode:190},
      {label:'/', shiftLabel:'?', code:'Slash', key:'/', shiftKey:'?', keyCode:191},
      {label:'Ctrl', code:'ControlLeft', key:'Control', keyCode:17, wide:true},
    ],
    // 第五行：空格、方向等
    [
      {label:'Alt', code:'AltLeft', key:'Alt', keyCode:18, wide:true},
      {label:'Space', code:'Space', key:' ', keyCode:32, space:true},
      {label:'Esc', code:'Escape', key:'Escape', keyCode:27},
      {label:'←', code:'ArrowLeft', key:'ArrowLeft', keyCode:37},
      {label:'↑', code:'ArrowUp', key:'ArrowUp', keyCode:38},
      {label:'↓', code:'ArrowDown', key:'ArrowDown', keyCode:40},
      {label:'→', code:'ArrowRight', key:'ArrowRight', keyCode:39},
    ]
  ];

  let shiftActive = false;
  let capsActive = false;
  let allButtons = []; // 存储所有按键DOM元素以便更新标签

  function updateAllButtonLabels() {
    allButtons.forEach(btn => {
      const kd = btn._keyData;
      if (!kd) return;
      if (kd.shift) {
        btn.textContent = shiftActive ? '▲ Shift' : 'Shift';
      } else if (kd.caps) {
        btn.textContent = capsActive ? '▲ Caps' : 'Caps';
      } else {
        const showShift = (shiftActive && !kd.special) || (capsActive && kd.shiftKey && kd.code && kd.code.startsWith('Key'));
        btn.textContent = showShift && kd.shiftLabel ? kd.shiftLabel : kd.label;
      }
    });
  }

  function sendKeyEvent(type, keyData, key) {
    if (!emulator) return;
    const code = keyData.code;
    const keyCode = keyData.keyCode;
    const init = {
      key: key,
      code: code,
      keyCode: keyCode,
      which: keyCode,
      bubbles: true,
      cancelable: true,
      view: window,
      location: code.includes('Left') ? 1 : 0,
      repeat: false,
      isComposing: false,
    };
    const event = new KeyboardEvent(type, init);
    Object.defineProperty(event, 'charCode', { value: keyCode });
    screenDiv.dispatchEvent(event);
  }

  function handleKeyPress(keyData, btn) {
    // 修饰键
    if (keyData.shift) {
      shiftActive = !shiftActive;
      btn.classList.toggle('active', shiftActive);
      sendKeyEvent('keydown', keyData, 'Shift');
      sendKeyEvent('keyup', keyData, 'Shift');
      updateAllButtonLabels();
      return;
    }
    if (keyData.caps) {
      capsActive = !capsActive;
      btn.classList.toggle('active', capsActive);
      sendKeyEvent('keydown', keyData, 'CapsLock');
      sendKeyEvent('keyup', keyData, 'CapsLock');
      updateAllButtonLabels();
      return;
    }

    let key = keyData.key;
    const isLetter = keyData.code && keyData.code.startsWith('Key') && keyData.code.length === 4;
    if (isLetter) {
      if ((shiftActive || capsActive) && keyData.shiftKey) {
        key = keyData.shiftKey;
      }
    } else {
      if (shiftActive && keyData.shiftKey) {
        key = keyData.shiftKey;
      }
    }

    sendKeyEvent('keydown', keyData, key);
    sendKeyEvent('keyup', keyData, key);

    // 按下普通键后自动取消 Shift（模拟物理键盘行为）
    if (shiftActive) {
      shiftActive = false;
      document.querySelectorAll('[data-code="ShiftLeft"]').forEach(b => b.classList.remove('active'));
      updateAllButtonLabels();
    }
  }

  function buildKeyboard() {
    const container = keyboardDiv.querySelector('.key-row') ? keyboardDiv : keyboardDiv;
    // 移除旧的按键行（保留拖拽手柄）
    const rows = keyboardDiv.querySelectorAll('.key-row');
    rows.forEach(r => r.remove());

    keyRows.forEach(row => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'key-row';
      row.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key-btn';
        if (k.wide) btn.classList.add('wide');
        if (k.space) btn.classList.add('space');
        btn.textContent = k.label;
        btn.setAttribute('data-code', k.code);
        btn._keyData = k;
        btn.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          handleKeyPress(k, btn);
        });
        rowDiv.appendChild(btn);
        allButtons.push(btn);
      });
      keyboardDiv.appendChild(rowDiv);
    });
  }

  buildKeyboard();
  log('虚拟键盘已就绪', 'success');

  // ========== 键盘拖动 ==========
  let dragging = false;
  let startX, startY, startLeft, startTop;

  function onDragStart(e) {
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    dragging = true;
    startX = touch.clientX;
    startY = touch.clientY;
    const rect = keyboardDiv.getBoundingClientRect();
    startLeft = rect.left;
    startTop = rect.top;
    keyboardDiv.style.transition = 'none';
    keyboardDiv.style.transform = 'none';
    keyboardDiv.style.left = startLeft + 'px';
    keyboardDiv.style.top = startTop + 'px';
    keyboardDiv.style.bottom = 'auto';
  }

  function onDragMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    const dx = touch.clientX - startX;
    const dy = touch.clientY - startY;
    let newLeft = startLeft + dx;
    let newTop = startTop + dy;
    // 边界限制
    const maxLeft = window.innerWidth - keyboardDiv.offsetWidth;
    const maxTop = window.innerHeight - keyboardDiv.offsetHeight;
    newLeft = Math.max(0, Math.min(newLeft, maxLeft));
    newTop = Math.max(0, Math.min(newTop, maxTop));
    keyboardDiv.style.left = newLeft + 'px';
    keyboardDiv.style.top = newTop + 'px';
  }

  function onDragEnd(e) {
    dragging = false;
    keyboardDiv.style.transition = '';
  }

  dragHandle.addEventListener('touchstart', onDragStart);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', onDragEnd);

  dragHandle.addEventListener('mousedown', onDragStart);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);

  // 初始位置：底部居中
  function positionKeyboard() {
    keyboardDiv.style.left = '50%';
    keyboardDiv.style.transform = 'translateX(-50%)';
    keyboardDiv.style.bottom = '20px';
    keyboardDiv.style.top = 'auto';
  }
  positionKeyboard();
  window.addEventListener('resize', positionKeyboard);

})();
</script>
</body>
</html>
