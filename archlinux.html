<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SwC Linux 终端</title>
  <style>
    body { margin: 0; background: #1a1e2b; display: flex; flex-direction: column; height: 100vh; font-family: 'JetBrains Mono', monospace; }
    #log-panel { background: #0d1117; color: #c9d1d9; flex: 0 0 130px; overflow-y: auto; padding: 10px; border-bottom: 2px solid #2a3a4a; font-size: 0.75rem; line-height: 1.4; white-space: pre-wrap; word-break: break-all; }
    .log-item { margin-bottom: 4px; }
    .log-error { color: #f85149; }
    .log-success { color: #3fb950; }
    .log-info { color: #58a6ff; }
    #screen-container { flex: 1; position: relative; background: #000; min-height: 400px; }
    #screen { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
    .touch-input {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; background: transparent; border: none; resize: none;
      font-size: 16px; color: transparent; caret-color: transparent;
      z-index: 20; user-select: none; -webkit-user-select: none;
    }
    .touch-input:focus { outline: none; }
    .overlay-hint {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #c9d1d9; font-size: 1.1rem; pointer-events: none;
      background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 6px; z-index: 30;
    }
  </style>
</head>
<body>
<div id="log-panel"><div class="log-item log-info">[系统] 初始化中...</div></div>
<div id="screen-container">
  <div id="screen"></div>
  <textarea class="touch-input" id="touchInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
  <div class="overlay-hint" id="overlay">点我以弹出键盘</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/v86@latest/build/libv86.js"></script>
<script>
(function() {
  const logPanel = document.getElementById('log-panel');
  const screenDiv = document.getElementById('screen');
  const screenContainer = document.getElementById('screen-container');
  const touchInput = document.getElementById('touchInput');
  const overlay = document.getElementById('overlay');

  function log(msg, type = 'info') {
    const item = document.createElement('div');
    item.className = `log-item log-${type}`;
    item.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logPanel.appendChild(item);
    logPanel.scrollTop = logPanel.scrollHeight;
  }

  if (typeof V86 === 'undefined') { log('V86 库加载失败', 'error'); return; }
  log('V86 库加载成功', 'success');

  const config = {
    screen_container: screenDiv,
    bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/seabios.bin" },
    vga_bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/vgabios.bin" },
    cdrom: { url: "https://cdn.jsdelivr.net/gh/copy/images@master/linux.iso" },
    wasm_path: "https://cdn.jsdelivr.net/npm/v86@latest/build/v86.wasm",
    autostart: true,
    disable_keyboard: false,
    disable_speaker: true,
    acpi: true,
  };

  let emulator;
  try {
    emulator = new V86(config);
    log('模拟器实例已创建', 'success');
  } catch (e) {
    log('创建模拟器实例失败: ' + e.message, 'error');
    return;
  }

  emulator.add_listener("emulator-loaded", () => {
    log('模拟器已启动！命令行就绪。', 'success');
    log('当前系统：Buildroot Linux · 登录：root / 空密码', 'info');
    overlay.style.display = 'none';
  });

  emulator.add_listener("error", (e) => log('模拟器错误: ' + (e.message || e), 'error'));

  // 焦点管理：点击屏幕弹出键盘
  screenContainer.addEventListener('click', () => {
    touchInput.focus();
  });

  // 通用的键盘事件克隆转发
  function cloneAndDispatch(originalEvent) {
    const type = originalEvent.type;
    const init = {
      key: originalEvent.key,
      code: originalEvent.code,
      location: originalEvent.location,
      repeat: originalEvent.repeat,
      isComposing: originalEvent.isComposing,
      charCode: originalEvent.charCode,
      keyCode: originalEvent.keyCode,
      which: originalEvent.which,
      bubbles: true,
      cancelable: true,
      view: window,
      detail: originalEvent.detail,
    };
    // 对于 keypress，某些浏览器还需要 charCode 属性
    const clonedEvent = new KeyboardEvent(type, init);
    // 额外设置 charCode 如果构造函数未处理
    Object.defineProperty(clonedEvent, 'charCode', { value: originalEvent.charCode });
    Object.defineProperty(clonedEvent, 'keyCode', { value: originalEvent.keyCode });
    Object.defineProperty(clonedEvent, 'which', { value: originalEvent.which });
    screenDiv.dispatchEvent(clonedEvent);
  }

  // 监听 textarea 上的键盘事件并转发
  touchInput.addEventListener('keydown', (e) => {
    cloneAndDispatch(e);
    e.preventDefault();   // 阻止 textarea 默认行为（如光标移动、文本输入）
  });

  touchInput.addEventListener('keypress', (e) => {
    cloneAndDispatch(e);
    e.preventDefault();
  });

  touchInput.addEventListener('keyup', (e) => {
    cloneAndDispatch(e);
    e.preventDefault();
  });

  // 确保 textarea 始终为空，并且不响应输入法
  touchInput.addEventListener('input', (e) => {
    touchInput.value = '';
  });
  touchInput.addEventListener('compositionstart', () => {});
  touchInput.addEventListener('compositionend', () => {
    touchInput.value = '';
  });

  // Esc 释放键盘
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      touchInput.blur();
      overlay.style.display = 'block';
      log('键盘已释放', 'info');
    }
  });

  log('初始化完成', 'success');
})();
</script>
</body>
</html>
