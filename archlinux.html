<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SwC Linux 终端</title>
  <style>
    body {
      margin: 0;
      background: #1a1e2b;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: 'JetBrains Mono', monospace;
    }
    #log-panel {
      background: #0d1117;
      color: #c9d1d9;
      flex: 0 0 180px;
      overflow-y: auto;
      padding: 12px;
      border-bottom: 2px solid #2a3a4a;
      font-size: 0.8rem;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-item { margin-bottom: 4px; }
    .log-error { color: #f85149; }
    .log-success { color: #3fb950; }
    .log-info { color: #58a6ff; }

    #screen-container {
      flex: 1;
      position: relative;
      background: #000;
      min-height: 400px; /* 强制最小高度 */
    }
    #screen {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
    }
    .overlay-hint {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #c9d1d9;
      font-size: 1.2rem;
      pointer-events: none;
      background: rgba(0,0,0,0.6);
      padding: 8px 20px;
      border-radius: 6px;
      z-index: 10;
    }
    .click-area {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.01);
      cursor: pointer;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="log-panel">
    <div class="log-item log-info">[系统] 初始化中...</div>
  </div>
  <div id="screen-container">
    <div id="screen"></div>
    <div class="click-area" id="clickArea" title="点击此处捕获键盘"></div>
    <div class="overlay-hint" id="overlay">点我以捕获键盘 · 按 Esc 释放</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/v86@latest/build/libv86.js"></script>
  <script>
    (function() {
      const logPanel = document.getElementById('log-panel');
      const screenDiv = document.getElementById('screen');
      const screenContainer = document.getElementById('screen-container');
      const clickArea = document.getElementById('clickArea');
      const overlay = document.getElementById('overlay');

      function log(msg, type = 'info') {
        const item = document.createElement('div');
        item.className = `log-item log-${type}`;
        item.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logPanel.appendChild(item);
        logPanel.scrollTop = logPanel.scrollHeight;
      }

      if (typeof V86 === 'undefined') {
        log('V86 库加载失败', 'error');
        return;
      }
      log('V86 库加载成功', 'success');

      const config = {
        screen_container: screenDiv,
        bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/seabios.bin" },
        vga_bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/vgabios.bin" },
        cdrom: { url: "https://cdn.jsdelivr.net/gh/copy/images@master/linux.iso" },
        wasm_path: "https://cdn.jsdelivr.net/npm/v86@latest/build/v86.wasm",
        autostart: true,
        disable_keyboard: false,
        disable_speaker: true,
        acpi: true,
      };

      let emulator;
      try {
        emulator = new V86(config);
        log('模拟器实例已创建', 'success');
      } catch (e) {
        log('创建模拟器实例失败: ' + e.message, 'error');
        return;
      }

      emulator.add_listener("emulator-loaded", () => {
        log('模拟器已启动！命令行就绪。', 'success');
        log('当前系统：Buildroot Linux · 登录：root / 空密码', 'info');

        // 自动锁定鼠标，确保可以输入
        setTimeout(() => {
          try {
            emulator.lock_mouse();
            overlay.style.display = 'none';
            clickArea.style.display = 'none';
            log('键盘已自动捕获，现在可以输入了', 'info');
          } catch (e) {
            log('自动捕获键盘失败，请点击屏幕中央', 'error');
            overlay.textContent = '请点击此处，然后开始输入';
          }
        }, 1000);
      });

      emulator.add_listener("error", (e) => {
        log('模拟器错误: ' + (e.message || e), 'error');
      });

      // 处理键盘捕获
      function lockMouse() {
        try {
          emulator.lock_mouse();
          overlay.style.display = 'none';
          clickArea.style.display = 'none';
          log('键盘已捕获', 'info');
        } catch (e) {
          log('捕获键盘失败，请重试点击', 'error');
        }
      }

      clickArea.addEventListener('click', lockMouse);
      screenDiv.addEventListener('click', lockMouse);

      // 按 Esc 释放键盘
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          try {
            emulator.unlock_mouse();
            overlay.style.display = 'block';
            clickArea.style.display = 'block';
            log('键盘已释放', 'info');
          } catch (e) {}
        }
      });

      // 确保容器尺寸足够
      function resizeHandler() {
        if (screenContainer.clientHeight < 200) {
          screenContainer.style.minHeight = '400px';
          log('强制设置屏幕最小高度 400px', 'info');
        }
      }
      resizeHandler();
      window.addEventListener('resize', resizeHandler);

      log('初始化完成', 'success');
    })();
  </script>
</body>
</html>
