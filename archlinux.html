<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SwC Linux 终端</title>
  <style>
    body {
      margin: 0;
      background: #1a1e2b;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
      -webkit-user-select: none;
    }
    #log-panel {
      background: #0d1117;
      color: #c9d1d9;
      flex: 0 0 120px;
      overflow-y: auto;
      padding: 6px 10px;
      border-bottom: 2px solid #2a3a4a;
      font-size: 0.75rem;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-item { margin-bottom: 2px; }
    .log-error { color: #f85149; }
    .log-success { color: #3fb950; }
    .log-info { color: #58a6ff; }
    .log-debug { color: #c9d1d9; }

    #screen-container {
      flex: 1;
      position: relative;
      background: #000;
      min-height: 0;
      overflow: hidden;
    }
    #screen {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 虚拟键盘 */
    #keyboard {
      background: #2a2e3b;
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-top: 2px solid #4a4e5b;
      flex-shrink: 0;
      z-index: 50;
    }
    .key-row {
      display: flex;
      justify-content: center;
      gap: 3px;
      flex-wrap: wrap;
    }
    .key-btn {
      background: #3a3e4b;
      border: 1px solid #5a5e6b;
      color: #e0e0e0;
      padding: 8px 0;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      min-width: 28px;
      text-align: center;
      transition: background 0.1s;
      touch-action: manipulation;
      flex: 0 0 auto;
    }
    .key-btn:active {
      background: #5a5e7b;
    }
    .key-btn.wide {
      min-width: 50px;
    }
    .key-btn.space {
      flex: 1;
      min-width: 80px;
    }
    .key-btn.active {
      background: #6a8e4b;
      border-color: #8ab86a;
    }
    .key-btn.highlight {
      background: #4a6e8b;
    }
  </style>
</head>
<body>
<div id="log-panel">
  <div class="log-item log-info">[系统] 初始化中...</div>
</div>
<div id="screen-container">
  <div id="screen"></div>
</div>
<div id="keyboard">
  <!-- 键盘由JS动态生成 -->
</div>

<script src="https://cdn.jsdelivr.net/npm/v86@latest/build/libv86.js"></script>
<script>
(function() {
  const logPanel = document.getElementById('log-panel');
  const screenDiv = document.getElementById('screen');
  const screenContainer = document.getElementById('screen-container');
  const keyboardDiv = document.getElementById('keyboard');

  function log(msg, type = 'info') {
    const item = document.createElement('div');
    item.className = `log-item log-${type}`;
    item.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logPanel.appendChild(item);
    logPanel.scrollTop = logPanel.scrollHeight;
  }

  if (typeof V86 === 'undefined') { log('V86 库加载失败', 'error'); return; }
  log('V86 库加载成功', 'success');

  // 注意：disable_keyboard: false 允许 v86 捕获键盘事件，但物理键盘不在，我们用虚拟键盘发送事件
  const config = {
    screen_container: screenDiv,
    bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/seabios.bin" },
    vga_bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/vgabios.bin" },
    cdrom: { url: "https://cdn.jsdelivr.net/gh/copy/images@master/linux.iso" },
    wasm_path: "https://cdn.jsdelivr.net/npm/v86@latest/build/v86.wasm",
    autostart: true,
    disable_keyboard: false,   // 必须为 false，否则 v86 不会监听 keyboard 事件
    disable_speaker: true,
    acpi: true,
  };

  let emulator;
  try {
    emulator = new V86(config);
    log('模拟器实例已创建', 'success');
  } catch (e) {
    log('创建模拟器实例失败: ' + e.message, 'error');
    return;
  }

  emulator.add_listener("emulator-loaded", () => {
    log('模拟器已启动！命令行就绪。', 'success');
    log('点击下方虚拟键盘输入', 'info');
  });

  emulator.add_listener("error", (e) => log('模拟器错误: ' + (e.message || e), 'error'));

  // 虚拟键盘按键定义
  const keys = [
    [
      {label:'`', code:'Backquote', key:'`', shiftKey:'~', keyCode:192},
      {label:'1', code:'Digit1', key:'1', shiftKey:'!', keyCode:49},
      {label:'2', code:'Digit2', key:'2', shiftKey:'@', keyCode:50},
      {label:'3', code:'Digit3', key:'3', shiftKey:'#', keyCode:51},
      {label:'4', code:'Digit4', key:'4', shiftKey:'$', keyCode:52},
      {label:'5', code:'Digit5', key:'5', shiftKey:'%', keyCode:53},
      {label:'6', code:'Digit6', key:'6', shiftKey:'^', keyCode:54},
      {label:'7', code:'Digit7', key:'7', shiftKey:'&', keyCode:55},
      {label:'8', code:'Digit8', key:'8', shiftKey:'*', keyCode:56},
      {label:'9', code:'Digit9', key:'9', shiftKey:'(', keyCode:57},
      {label:'0', code:'Digit0', key:'0', shiftKey:')', keyCode:48},
      {label:'-', code:'Minus', key:'-', shiftKey:'_', keyCode:173},
      {label:'=', code:'Equal', key:'=', shiftKey:'+', keyCode:61},
      {label:'Back', code:'Backspace', key:'Backspace', keyCode:8, wide:true}
    ],
    [
      {label:'Tab', code:'Tab', key:'Tab', keyCode:9, wide:true},
      {label:'q', code:'KeyQ', key:'q', shiftKey:'Q', keyCode:81},
      {label:'w', code:'KeyW', key:'w', shiftKey:'W', keyCode:87},
      {label:'e', code:'KeyE', key:'e', shiftKey:'E', keyCode:69},
      {label:'r', code:'KeyR', key:'r', shiftKey:'R', keyCode:82},
      {label:'t', code:'KeyT', key:'t', shiftKey:'T', keyCode:84},
      {label:'y', code:'KeyY', key:'y', shiftKey:'Y', keyCode:89},
      {label:'u', code:'KeyU', key:'u', shiftKey:'U', keyCode:85},
      {label:'i', code:'KeyI', key:'i', shiftKey:'I', keyCode:73},
      {label:'o', code:'KeyO', key:'o', shiftKey:'O', keyCode:79},
      {label:'p', code:'KeyP', key:'p', shiftKey:'P', keyCode:80},
      {label:'[', code:'BracketLeft', key:'[', shiftKey:'{', keyCode:219},
      {label:']', code:'BracketRight', key:']', shiftKey:'}', keyCode:221},
      {label:'\\', code:'Backslash', key:'\\', shiftKey:'|', keyCode:220}
    ],
    [
      {label:'Caps', code:'CapsLock', key:'CapsLock', keyCode:20, wide:true, caps:true},
      {label:'a', code:'KeyA', key:'a', shiftKey:'A', keyCode:65},
      {label:'s', code:'KeyS', key:'s', shiftKey:'S', keyCode:83},
      {label:'d', code:'KeyD', key:'d', shiftKey:'D', keyCode:68},
      {label:'f', code:'KeyF', key:'f', shiftKey:'F', keyCode:70},
      {label:'g', code:'KeyG', key:'g', shiftKey:'G', keyCode:71},
      {label:'h', code:'KeyH', key:'h', shiftKey:'H', keyCode:72},
      {label:'j', code:'KeyJ', key:'j', shiftKey:'J', keyCode:74},
      {label:'k', code:'KeyK', key:'k', shiftKey:'K', keyCode:75},
      {label:'l', code:'KeyL', key:'l', shiftKey:'L', keyCode:76},
      {label:';', code:'Semicolon', key:';', shiftKey:':', keyCode:186},
      {label:"'", code:'Quote', key:"'", shiftKey:'"', keyCode:222},
      {label:'Enter', code:'Enter', key:'Enter', keyCode:13, wide:true}
    ],
    [
      {label:'Shift', code:'ShiftLeft', key:'Shift', keyCode:16, wide:true, shift:true},
      {label:'z', code:'KeyZ', key:'z', shiftKey:'Z', keyCode:90},
      {label:'x', code:'KeyX', key:'x', shiftKey:'X', keyCode:88},
      {label:'c', code:'KeyC', key:'c', shiftKey:'C', keyCode:67},
      {label:'v', code:'KeyV', key:'v', shiftKey:'V', keyCode:86},
      {label:'b', code:'KeyB', key:'b', shiftKey:'B', keyCode:66},
      {label:'n', code:'KeyN', key:'n', shiftKey:'N', keyCode:78},
      {label:'m', code:'KeyM', key:'m', shiftKey:'M', keyCode:77},
      {label:',', code:'Comma', key:',', shiftKey:'<', keyCode:188},
      {label:'.', code:'Period', key:'.', shiftKey:'>', keyCode:190},
      {label:'/', code:'Slash', key:'/', shiftKey:'?', keyCode:191},
      {label:'Ctrl', code:'ControlLeft', key:'Control', keyCode:17, wide:true},
    ],
    [
      {label:'Alt', code:'AltLeft', key:'Alt', keyCode:18, wide:true},
      {label:'Space', code:'Space', key:' ', keyCode:32, space:true},
      {label:'Esc', code:'Escape', key:'Escape', keyCode:27},
      {label:'←', code:'ArrowLeft', key:'ArrowLeft', keyCode:37},
      {label:'↑', code:'ArrowUp', key:'ArrowUp', keyCode:38},
      {label:'↓', code:'ArrowDown', key:'ArrowDown', keyCode:40},
      {label:'→', code:'ArrowRight', key:'ArrowRight', keyCode:39},
    ]
  ];

  let shiftActive = false;
  let capsActive = false;

  function buildKeyboard() {
    keyboardDiv.innerHTML = '';
    keys.forEach(row => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'key-row';
      row.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key-btn';
        if (k.wide) btn.classList.add('wide');
        if (k.space) btn.classList.add('space');
        btn.textContent = k.label;
        btn.setAttribute('data-code', k.code);
        btn._keyData = k;
        btn.addEventListener('pointerdown', (e) => {
          e.preventDefault(); // 防止触屏时的默认行为
          handleKeyPress(k, btn);
        });
        // 防止快速点击时重复
        btn.addEventListener('click', (e) => e.preventDefault());
        rowDiv.appendChild(btn);
      });
      keyboardDiv.appendChild(rowDiv);
    });
    log('虚拟键盘已构建', 'debug');
  }

  function sendKeyEvent(type, keyData, key) {
    if (!emulator) return;
    const code = keyData.code;
    const keyCode = keyData.keyCode;
    const init = {
      key: key,
      code: code,
      keyCode: keyCode,
      which: keyCode,
      bubbles: true,
      cancelable: true,
      view: window,
      location: code.includes('Left') ? 1 : 0,
      repeat: false,
      isComposing: false,
    };
    const event = new KeyboardEvent(type, init);
    // 为某些浏览器设置 charCode
    Object.defineProperty(event, 'charCode', { value: keyCode });
    screenDiv.dispatchEvent(event);
    log(`发送事件: ${type} key=${key} code=${code} keyCode=${keyCode}`, 'debug');
  }

  function handleKeyPress(keyData, btn) {
    // 处理修饰键
    if (keyData.shift) {
      shiftActive = !shiftActive;
      btn.classList.toggle('active', shiftActive);
      sendKeyEvent('keydown', keyData, 'Shift');
      sendKeyEvent('keyup', keyData, 'Shift');
      return;
    }
    if (keyData.caps) {
      capsActive = !capsActive;
      btn.classList.toggle('active', capsActive);
      sendKeyEvent('keydown', keyData, 'CapsLock');
      sendKeyEvent('keyup', keyData, 'CapsLock');
      return;
    }

    let key = keyData.key;
    // 处理字母大小写
    if (keyData.shiftKey && (shiftActive || capsActive)) {
      key = keyData.shiftKey;
    } else if (keyData.shiftKey && shiftActive) {
      key = keyData.shiftKey;
    }

    // 发送键事件
    sendKeyEvent('keydown', keyData, key);
    sendKeyEvent('keyup', keyData, key);

    // 自动取消 Shift
    if (shiftActive) {
      shiftActive = false;
      document.querySelectorAll('[data-code="ShiftLeft"]').forEach(b => b.classList.remove('active'));
    }
  }

  buildKeyboard();
  log('虚拟键盘初始化完成', 'success');

  // 监控屏幕点击（如果需要物理键盘时可以使用）
  screenContainer.addEventListener('click', () => {
    if (emulator && !emulator.keyboard_locked) {
      emulator.lock_mouse();
    }
  });

})();
</script>
</body>
</html>
