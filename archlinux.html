<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SwC Arch Linux 终端</title>
  <style>
    body {
      margin: 0;
      background: #1a1e2b;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: 'JetBrains Mono', monospace;
    }
    #log-panel {
      background: #0d1117;
      color: #c9d1d9;
      flex: 0 0 180px;
      overflow-y: auto;
      padding: 12px;
      border-bottom: 2px solid #2a3a4a;
      font-size: 0.8rem;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-item { margin-bottom: 4px; }
    .log-error { color: #f85149; }
    .log-success { color: #3fb950; }
    .log-info { color: #58a6ff; }
    .log-warn { color: #d2991d; }

    #screen-container {
      flex: 1;
      position: relative;
      background: #000;
      display: none;
    }
    #screen {
      width: 100%;
      height: 100%;
      border: none;
    }
    .overlay-hint {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #c9d1d9;
      font-size: 1.2rem;
      pointer-events: none;
      background: rgba(0,0,0,0.6);
      padding: 8px 20px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="log-panel">
    <div class="log-item log-info">[系统] 初始化日志面板 · 简化版（需 SharedArrayBuffer）</div>
  </div>
  <div id="screen-container">
    <div id="screen"></div>
    <div class="overlay-hint" id="overlay">点击屏幕以捕获键盘 · 按 Esc 释放</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/v86@latest/build/libv86.js"></script>
  <script>
    (function() {
      const logPanel = document.getElementById('log-panel');
      const screenDiv = document.getElementById('screen');
      const screenContainer = document.getElementById('screen-container');
      const overlay = document.getElementById('overlay');

      function log(msg, type = 'info') {
        const item = document.createElement('div');
        item.className = `log-item log-${type}`;
        item.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logPanel.appendChild(item);
        logPanel.scrollTop = logPanel.scrollHeight;
      }

      // 关键检查：SharedArrayBuffer
      if (typeof SharedArrayBuffer === 'undefined') {
        log('FATAL: SharedArrayBuffer 不可用，v86 无法启动。', 'error');
        log('请网站管理员在服务器上添加以下 HTTP 响应头（Cloudflare Pages 可用 _headers 文件）：', 'warn');
        log('  Cross-Origin-Opener-Policy: same-origin', 'warn');
        log('  Cross-Origin-Embedder-Policy: require-corp', 'warn');
        log('添加后刷新页面即可。', 'info');
        return; // 不再继续，因为根本不能跑
      }
      log('SharedArrayBuffer 可用', 'success');

      if (typeof V86 === 'undefined') {
        log('FATAL: V86 库加载失败', 'error');
        return;
      }
      log('V86 库加载成功', 'success');

      const BIOS_URL = "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/seabios.bin";
      const VGA_BIOS_URL = "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/vgabios.bin";
      // 使用 Buildroot Linux 作为默认镜像，若你需要 Arch Linux，可替换 CDROM_URL
      const CDROM_URL = "https://cdn.jsdelivr.net/gh/copy/images@master/linux.iso";

      // 简单的资源验证（非必须，但可提供反馈）
      async function verify(url) {
        try {
          const resp = await fetch(url, { method: 'HEAD', mode: 'cors' });
          return resp.ok;
        } catch { return false; }
      }

      async function start() {
        log('正在验证资源可访问性…', 'info');
        const biosOk = await verify(BIOS_URL);
        log(`BIOS: ${biosOk ? '可访问' : '不可访问'}`, biosOk ? 'success' : 'error');
        const vgaOk = await verify(VGA_BIOS_URL);
        log(`VGA BIOS: ${vgaOk ? '可访问' : '不可访问'}`, vgaOk ? 'success' : 'error');
        const isoOk = await verify(CDROM_URL);
        log(`系统镜像: ${isoOk ? '可访问' : '不可访问'}`, isoOk ? 'success' : 'error');

        if (!biosOk || !vgaOk || !isoOk) {
          log('资源验证失败，无法继续。', 'error');
          return;
        }

        log('正在创建模拟器实例…', 'info');
        const config = {
          screen_container: screenDiv,
          bios: { url: BIOS_URL },
          vga_bios: { url: VGA_BIOS_URL },
          cdrom: { url: CDROM_URL },
          autostart: true,
          disable_keyboard: false,
          disable_speaker: true,
          acpi: true,
        };

        let emulator;
        try {
          emulator = new V86(config);
          screenContainer.style.display = 'flex';
          log('模拟器实例已创建', 'success');
        } catch (e) {
          log(`创建模拟器失败: ${e.message}`, 'error');
          return;
        }

        let startupTimeout = setTimeout(() => {
          log('模拟器启动超时（60秒）。若未报错，可能是镜像引导问题。', 'warn');
        }, 60000);

        emulator.add_listener("emulator-started", () => {
          clearTimeout(startupTimeout);
          log('模拟器已启动！命令行就绪。', 'success');
          log('登录信息：用户名 root，密码为空。', 'info');
        });

        emulator.add_listener("error", (e) => {
          clearTimeout(startupTimeout);
          log('模拟器运行时错误: ' + e, 'error');
        });

        screenDiv.addEventListener('click', () => {
          emulator.lock_mouse();
          overlay.style.display = 'none';
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            emulator.unlock_mouse();
            overlay.style.display = 'block';
          }
        });
        setTimeout(() => { overlay.style.display = 'block'; }, 3000);
      }

      start();
    })();
  </script>
</body>
</html>
