<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>原始图像显示器 | RGBA 像素导入</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel-bg: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --btn-bg: #e9ecef;
      --btn-border: #b0b8c1;
      --btn-hover: #dde1e5;
      --accent: #1f6feb;
      --accent-hover: #1558c2;
      --input-bg: #ffffff;
      --canvas-bg: #1e1e1e;
    }
    [data-theme="dark"] {
      --bg: #0f1419;
      --panel-bg: #1a2230;
      --border: #2e3b4b;
      --text: #c9d1d9;
      --btn-bg: #212b36;
      --btn-border: #3a4756;
      --btn-hover: #2a3545;
      --accent: #58a6ff;
      --accent-hover: #4090e0;
      --input-bg: #161e28;
      --canvas-bg: #0a0d10;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }
    .panel {
      max-width: 900px;
      width: 100%;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    .title {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .theme-toggle {
      margin-left: auto;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--text);
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
    }
    .theme-toggle:hover { background: var(--btn-hover); }
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .controls label {
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .controls input {
      width: 80px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.9rem;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border 0.2s;
    }
    .controls input:focus { border-color: var(--accent); }
    .btn {
      background: var(--accent);
      border: none;
      color: white;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
    }
    .btn-secondary:hover { background: var(--btn-hover); }
    .editor-area {
      flex-shrink: 0;
      margin-bottom: 12px;
    }
    textarea {
      width: 100%;
      height: 120px;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      background: var(--input-bg);
      color: var(--text);
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: var(--accent); }
    .canvas-container {
      flex: 1;
      background: var(--canvas-bg);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid var(--border);
      position: relative;
      min-height: 80%;
    }
    canvas {
      display: block;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .status {
      font-size: 0.8rem;
      margin-top: 8px;
      color: var(--text);
      opacity: 0.7;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="panel">
  <div class="title">
    🖼️ 原始图像显示器
    <button class="theme-toggle" id="themeToggle">深色</button>
  </div>

  <div class="controls">
    <label>宽度 <input type="number" id="widthInput" value="2" min="1" step="1" placeholder="像素"></label>
    <label>高度 <input type="number" id="heightInput" value="2" min="1" step="1" placeholder="像素"></label>
    <button class="btn" id="renderBtn">🔍 渲染图像</button>
    <button class="btn btn-secondary" id="clearBtn">🗑️ 清空数据</button>
    <button class="btn btn-secondary" id="exampleBtn">📋 示例 (2x2)</button>
  </div>

  <div class="editor-area">
    <textarea id="pixelData" placeholder="在此粘贴 RGBA 像素数据...&#10;支持 // 注释&#10;每像素 4 个数值: R G B A，任意分隔"></textarea>
  </div>

  <div class="canvas-container" id="canvasContainer">
    <canvas id="imageCanvas"></canvas>
  </div>
  <div class="status" id="statusText">就绪</div>
</div>

<script>
  (function() {
    // 主题切换
    const themeToggle = document.getElementById('themeToggle');
    const currentTheme = localStorage.getItem('swc_theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.textContent = currentTheme === 'light' ? '深色' : '亮色';
    themeToggle.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('swc_theme', next);
      themeToggle.textContent = next === 'light' ? '深色' : '亮色';
    });

    // DOM 元素
    const widthInput = document.getElementById('widthInput');
    const heightInput = document.getElementById('heightInput');
    const pixelDataTextarea = document.getElementById('pixelData');
    const renderBtn = document.getElementById('renderBtn');
    const clearBtn = document.getElementById('clearBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const canvas = document.getElementById('imageCanvas');
    const canvasContainer = document.getElementById('canvasContainer');
    const statusText = document.getElementById('statusText');
    const ctx = canvas.getContext('2d');

    let imageWidth = 0;
    let imageHeight = 0;

    function setStatus(msg, isError = false) {
      statusText.textContent = msg;
      statusText.style.color = isError ? '#e74c3c' : '';
    }

    // 预处理输入：移除 // 注释，然后提取所有数字
    function parseNumbers(text) {
      // 逐行处理，去掉 // 注释及之后的内容
      const lines = text.split('\n');
      const cleaned = lines.map(line => {
        const commentIdx = line.indexOf('//');
        return commentIdx >= 0 ? line.substring(0, commentIdx) : line;
      }).join(' ');
      const matches = cleaned.match(/-?\d+(\.\d+)?/g);
      if (!matches) return [];
      return matches.map(n => Math.round(parseFloat(n)));
    }

    function clamp(val) {
      return Math.min(255, Math.max(0, val));
    }

    function resizeCanvasDisplay() {
      if (imageWidth === 0 || imageHeight === 0) return;
      const containerWidth = canvasContainer.clientWidth;
      const containerHeight = canvasContainer.clientHeight;
      if (containerWidth <= 0 || containerHeight <= 0) return;
      const imageRatio = imageWidth / imageHeight;
      const containerRatio = containerWidth / containerHeight;
      let displayWidth, displayHeight;
      if (imageRatio > containerRatio) {
        displayWidth = containerWidth;
        displayHeight = containerWidth / imageRatio;
      } else {
        displayHeight = containerHeight;
        displayWidth = containerHeight * imageRatio;
      }
      canvas.style.width = displayWidth + 'px';
      canvas.style.height = displayHeight + 'px';
    }

    function renderImage() {
      const w = parseInt(widthInput.value, 10);
      const h = parseInt(heightInput.value, 10);
      if (isNaN(w) || isNaN(h) || w < 1 || h < 1) {
        setStatus('宽度和高度必须是正整数', true);
        return;
      }

      const totalPixels = w * h;
      const expectedValues = totalPixels * 4;
      const raw = pixelDataTextarea.value.trim();
      if (!raw) {
        setStatus('请先粘贴像素数据', true);
        return;
      }

      const numbers = parseNumbers(raw);
      if (numbers.length < expectedValues) {
        setStatus(`数据不足：需要 ${expectedValues} 个数值，但只读到 ${numbers.length} 个`, true);
        return;
      }

      const data = numbers.slice(0, expectedValues);
      const imageData = new ImageData(w, h);

      for (let i = 0; i < totalPixels; i++) {
        const offset = i * 4;
        imageData.data[offset]     = clamp(data[offset]);
        imageData.data[offset + 1] = clamp(data[offset + 1]);
        imageData.data[offset + 2] = clamp(data[offset + 2]);
        imageData.data[offset + 3] = clamp(data[offset + 3]);
      }

      canvas.width = w;
      canvas.height = h;
      ctx.putImageData(imageData, 0, 0);

      imageWidth = w;
      imageHeight = h;
      resizeCanvasDisplay();
      setStatus(`已渲染 ${w}×${h} 图像 (${totalPixels} 像素)`);
    }

    function clearImage() {
      pixelDataTextarea.value = '';
      canvas.width = 0;
      canvas.height = 0;
      canvas.style.width = '0';
      canvas.style.height = '0';
      imageWidth = 0;
      imageHeight = 0;
      setStatus('已清空');
    }

    function loadExample() {
      widthInput.value = 2;
      heightInput.value = 2;
      pixelDataTextarea.value = `114 114 114 255
114 113 113 255
112 114 115 255
// 这是一个注释行，会被忽略
114 114 114 255`;
      setStatus('示例数据已加载（含注释）');
    }

    window.addEventListener('resize', resizeCanvasDisplay);

    renderBtn.addEventListener('click', renderImage);
    clearBtn.addEventListener('click', clearImage);
    exampleBtn.addEventListener('click', loadExample);

    setStatus('就绪');
  })();
</script>
</body>
</html>
