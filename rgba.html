<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>原始图像显示器 | RGBA 像素导入</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --border: #cbd5e0;
      --text: #1a202c;
      --text-secondary: #4a5568;
      --btn-bg: #e2e8f0;
      --btn-border: #a0aec0;
      --btn-hover: #cbd5e0;
      --accent: #3182ce;
      --accent-hover: #2b6cb0;
      --input-bg: #ffffff;
      --canvas-bg: #1e1e1e;
      --header-bg: #ffffff;
      --shadow: 0 4px 16px rgba(0,0,0,0.06);
      --radius: 16px;
    }
    [data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-secondary: #8b949e;
      --btn-bg: #21262d;
      --btn-border: #30363d;
      --btn-hover: #30363d;
      --accent: #58a6ff;
      --accent-hover: #4090e0;
      --input-bg: #0d1117;
      --canvas-bg: #0a0d10;
      --header-bg: #161b22;
      --shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .panel {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
    }
    .title {
      font-size: 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-btns {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .back-link {
      text-decoration: none;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 500;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 30px;
      transition: 0.2s;
      background: var(--btn-bg);
    }
    .back-link:hover {
      background: var(--btn-hover);
    }
    .theme-toggle {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
    }
    .theme-toggle:hover { background: var(--btn-hover); }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }
    .controls label {
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .controls input {
      width: 80px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.9rem;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
    }
    .controls input:focus { border-color: var(--accent); }
    .btn {
      background: var(--accent);
      border: none;
      color: white;
      padding: 9px 20px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
    }
    .btn-secondary:hover { background: var(--btn-hover); }
    .editor-area {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }
    textarea {
      width: 100%;
      height: 100px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      background: var(--input-bg);
      color: var(--text);
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: var(--accent); }
    .canvas-container {
      flex: 1;
      min-height: 250px;
      background: var(--canvas-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }
    .status {
      font-size: 0.8rem;
      padding: 10px 20px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }
    /* 自适应容器内 canvas 尺寸在 JS 中控制，此处仅作为后备 */
    canvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
<div class="panel">
  <div class="header">
    <div class="title">🖼️ 原始图像显示器</div>
    <div class="header-btns">
      <a href="index.html" class="back-link">← 返回主站</a>
      <button class="theme-toggle" id="themeToggle">深色</button>
    </div>
  </div>

  <div class="controls">
    <label>宽度 <input type="number" id="widthInput" value="2" min="1" step="1" placeholder="像素"></label>
    <label>高度 <input type="number" id="heightInput" value="2" min="1" step="1" placeholder="像素"></label>
    <button class="btn" id="renderBtn">渲染图像</button>
    <button class="btn btn-secondary" id="clearBtn">清空</button>
    <button class="btn btn-secondary" id="exampleBtn">示例 (2x2)</button>
  </div>

  <div class="editor-area">
    <textarea id="pixelData" placeholder="在此粘贴 RGBA 像素数据...&#10;支持 // 注释&#10;每像素 4 个数值: R G B A，任意分隔"></textarea>
  </div>

  <div class="canvas-container" id="canvasContainer">
    <canvas id="imageCanvas"></canvas>
  </div>
  <div class="status" id="statusText">就绪 · 上次图像已自动恢复</div>
</div>

<script>
  (function() {
    // ========== 主题 ==========
    const themeToggle = document.getElementById('themeToggle');
    const currentTheme = localStorage.getItem('swc_theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.textContent = currentTheme === 'light' ? '深色' : '亮色';
    themeToggle.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('swc_theme', next);
      themeToggle.textContent = next === 'light' ? '深色' : '亮色';
      // 重新应用 canvas 尺寸（主题切换不影响尺寸，但以防万一）
      resizeCanvas();
    });

    // ========== DOM 元素 ==========
    const widthInput = document.getElementById('widthInput');
    const heightInput = document.getElementById('heightInput');
    const pixelDataTextarea = document.getElementById('pixelData');
    const renderBtn = document.getElementById('renderBtn');
    const clearBtn = document.getElementById('clearBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const canvas = document.getElementById('imageCanvas');
    const canvasContainer = document.getElementById('canvasContainer');
    const statusText = document.getElementById('statusText');
    const ctx = canvas.getContext('2d');

    // 当前图像的原始尺寸
    let imageWidth = 0;
    let imageHeight = 0;

    // ========== 本地存储键 ==========
    const STORAGE_KEY = {
      width: 'rgba_image_width',
      height: 'rgba_image_height',
      data: 'rgba_image_data'
    };

    // ========== 辅助函数 ==========
    function setStatus(msg, isError = false) {
      statusText.textContent = msg;
      statusText.style.color = isError ? '#e74c3c' : '';
    }

    // 解析输入：移除 // 注释，提取所有数字
    function parseNumbers(text) {
      const lines = text.split('\n');
      const cleaned = lines.map(line => {
        const idx = line.indexOf('//');
        return idx >= 0 ? line.substring(0, idx) : line;
      }).join(' ');
      const matches = cleaned.match(/-?\d+(\.\d+)?/g);
      if (!matches) return [];
      return matches.map(n => Math.round(parseFloat(n)));
    }

    function clamp(val) {
      return Math.min(255, Math.max(0, val));
    }

    // 根据容器大小和图像比例计算 canvas 显示尺寸
    function resizeCanvas() {
      if (imageWidth <= 0 || imageHeight <= 0) {
        canvas.style.width = '0';
        canvas.style.height = '0';
        return;
      }
      const cw = canvasContainer.clientWidth;
      const ch = canvasContainer.clientHeight;
      if (cw <= 0 || ch <= 0) return;
      const imageRatio = imageWidth / imageHeight;
      const containerRatio = cw / ch;
      let displayW, displayH;
      if (imageRatio > containerRatio) {
        displayW = cw;
        displayH = cw / imageRatio;
      } else {
        displayH = ch;
        displayW = ch * imageRatio;
      }
      // 最小显示尺寸至少1px
      canvas.style.width = Math.max(1, displayW) + 'px';
      canvas.style.height = Math.max(1, displayH) + 'px';
    }

    // 执行渲染
    function renderImage(w, h, pixelValues) {
      const totalPixels = w * h;
      if (pixelValues.length < totalPixels * 4) {
        setStatus(`数据不足：需要 ${totalPixels*4} 个数值，但只有 ${pixelValues.length} 个`, true);
        return false;
      }

      const data = pixelValues.slice(0, totalPixels * 4);
      const imageData = new ImageData(w, h);
      for (let i = 0; i < totalPixels; i++) {
        const off = i * 4;
        imageData.data[off]   = clamp(data[off]);
        imageData.data[off+1] = clamp(data[off+1]);
        imageData.data[off+2] = clamp(data[off+2]);
        imageData.data[off+3] = clamp(data[off+3]);
      }

      canvas.width = w;
      canvas.height = h;
      ctx.putImageData(imageData, 0, 0);

      imageWidth = w;
      imageHeight = h;
      resizeCanvas();
      return true;
    }

    // 从文本域和宽高输入渲染
    function renderFromInputs() {
      const w = parseInt(widthInput.value, 10);
      const h = parseInt(heightInput.value, 10);
      if (isNaN(w) || isNaN(h) || w < 1 || h < 1) {
        setStatus('宽度和高度必须是正整数', true);
        return false;
      }
      const raw = pixelDataTextarea.value.trim();
      if (!raw) {
        setStatus('请先粘贴像素数据', true);
        return false;
      }
      const numbers = parseNumbers(raw);
      const success = renderImage(w, h, numbers);
      if (success) {
        setStatus(`已渲染 ${w}×${h} 图像 (${w*h} 像素)`);
        // 保存到 localStorage
        saveToStorage(w, h, raw);
      }
      return success;
    }

    // ========== 本地存储持久化 ==========
    function saveToStorage(w, h, rawData) {
      localStorage.setItem(STORAGE_KEY.width, w);
      localStorage.setItem(STORAGE_KEY.height, h);
      localStorage.setItem(STORAGE_KEY.data, rawData);
    }

    function clearStorage() {
      localStorage.removeItem(STORAGE_KEY.width);
      localStorage.removeItem(STORAGE_KEY.height);
      localStorage.removeItem(STORAGE_KEY.data);
    }

    function loadFromStorage() {
      const w = localStorage.getItem(STORAGE_KEY.width);
      const h = localStorage.getItem(STORAGE_KEY.height);
      const data = localStorage.getItem(STORAGE_KEY.data);
      if (w !== null && h !== null && data !== null) {
        const numW = parseInt(w, 10);
        const numH = parseInt(h, 10);
        if (numW > 0 && numH > 0 && data.trim().length > 0) {
          widthInput.value = numW;
          heightInput.value = numH;
          pixelDataTextarea.value = data;
          return true;
        }
      }
      return false;
    }

    // 自动恢复上次图像
    function autoRestore() {
      if (loadFromStorage()) {
        const numbers = parseNumbers(pixelDataTextarea.value);
        const w = parseInt(widthInput.value, 10);
        const h = parseInt(heightInput.value, 10);
        if (renderImage(w, h, numbers)) {
          setStatus(`已恢复上次图像 (${w}×${h})`);
          return;
        }
      }
      setStatus('就绪');
    }

    // 清空画布及存储
    function clearAll() {
      pixelDataTextarea.value = '';
      canvas.width = 0;
      canvas.height = 0;
      canvas.style.width = '0';
      canvas.style.height = '0';
      imageWidth = 0;
      imageHeight = 0;
      clearStorage();
      setStatus('已清空');
    }

    // 示例数据
    function loadExample() {
      widthInput.value = 2;
      heightInput.value = 2;
      pixelDataTextarea.value = `114 114 114 255
114 113 113 255
112 114 115 255
// 这是一个注释行，会被忽略
114 114 114 255`;
      setStatus('示例数据已加载');
    }

    // ========== 事件绑定 ==========
    renderBtn.addEventListener('click', renderFromInputs);
    clearBtn.addEventListener('click', clearAll);
    exampleBtn.addEventListener('click', loadExample);

    window.addEventListener('resize', resizeCanvas);
    // 使用 ResizeObserver 监听容器变化（更精准）
    if (window.ResizeObserver) {
      new ResizeObserver(() => {
        if (imageWidth > 0 && imageHeight > 0) {
          resizeCanvas();
        }
      }).observe(canvasContainer);
    }

    // 初始自动恢复
    autoRestore();
  })();
</script>
</body>
</html>
