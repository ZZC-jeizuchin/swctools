<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Browser Shell</title>
  <style>
    :root {
      --bar-bg: #1e293b;
      --input-bg: #334155;
      --btn-blue: #3b82f6;
      --btn-hover: #2563eb;
      --btn-gray: #475569;
      --text: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f172a;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bar-bg);
      color: var(--text);
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 1000;
    }
    .toolbar .brand {
      font-weight: 700;
      white-space: nowrap;
      font-size: 1rem;
      margin-right: 4px;
    }
    .nav-btns {
      display: flex;
      gap: 4px;
    }
    .toolbar button {
      background: transparent;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .toolbar button:hover {
      background: rgba(255,255,255,0.15);
    }
    .address-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border-radius: 24px;
      padding: 0 14px;
      height: 36px;
    }
    .address-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 0.9rem;
      outline: none;
      padding: 0 6px;
    }
    .address-bar input::placeholder {
      color: #94a3b8;
    }
    .go-btn {
      background: var(--btn-blue) !important;
      border-radius: 20px !important;
      padding: 6px 16px !important;
      font-weight: 600;
      font-size: 0.85rem !important;
      margin-left: 4px;
    }
    .go-btn:hover {
      background: var(--btn-hover) !important;
    }

    .content-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="brand">🌐 浏览器</span>
    <div class="nav-btns">
      <button id="backBtn" title="后退">←</button>
      <button id="forwardBtn" title="前进">→</button>
      <button id="refreshBtn" title="刷新">↻</button>
      <button id="homeBtn" title="主页">⌂</button>
    </div>
    <div class="address-bar">
      <input type="text" id="urlInput" placeholder="输入网址或搜索词" autofocus>
    </div>
    <button id="goBtn" class="go-btn">打开</button>
  </div>

  <iframe id="contentFrame" class="content-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-modals allow-downloads"></iframe>

  <script>
    const urlInput = document.getElementById('urlInput');
    const goBtn = document.getElementById('goBtn');
    const backBtn = document.getElementById('backBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const homeBtn = document.getElementById('homeBtn');
    const iframe = document.getElementById('contentFrame');

    const HOME_URL = 'https://www.google.com';

    // 更新地址栏显示（仅在非编辑状态下）
    function updateAddressBar() {
      if (document.activeElement === urlInput) return; // 正在编辑时不覆盖
      try {
        const doc = iframe.contentDocument;
        if (doc && doc.location) {
          urlInput.value = doc.location.href;
        }
      } catch (e) {}
    }

    // 导航
    function navigate(rawUrl) {
      let finalUrl = rawUrl.trim();
      if (!finalUrl) return;

      if (!/^https?:\/\//i.test(finalUrl) && !finalUrl.startsWith('//')) {
        if (!finalUrl.includes('.') || finalUrl.includes(' ')) {
          finalUrl = 'https://www.google.com/search?q=' + encodeURIComponent(finalUrl);
        } else {
          finalUrl = 'https://' + finalUrl;
        }
      }

      urlInput.value = finalUrl;
      iframe.src = finalUrl;
    }

    // 事件
    goBtn.addEventListener('click', () => navigate(urlInput.value));
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') navigate(urlInput.value);
    });

    backBtn.addEventListener('click', () => {
      try { iframe.contentWindow.history.back(); } catch (e) {}
    });
    forwardBtn.addEventListener('click', () => {
      try { iframe.contentWindow.history.forward(); } catch (e) {}
    });
    refreshBtn.addEventListener('click', () => {
      try { iframe.contentWindow.location.reload(); } catch (e) { iframe.src = iframe.src; }
    });
    homeBtn.addEventListener('click', () => navigate(HOME_URL));

    // 监听 iframe 加载完更新地址栏
    iframe.addEventListener('load', updateAddressBar);

    // 当用户点击地址栏准备编辑时，暂停定时更新；离开后再恢复
    let updateInterval = null;

    function startAutoUpdate() {
      stopAutoUpdate();
      updateInterval = setInterval(updateAddressBar, 1000);
    }

    function stopAutoUpdate() {
      if (updateInterval) {
        clearInterval(updateInterval);
        updateInterval = null;
      }
    }

    urlInput.addEventListener('focus', stopAutoUpdate);
    urlInput.addEventListener('blur', () => {
      // 失去焦点时延迟一会再更新，避免刚离开时刷新
      setTimeout(() => {
        updateAddressBar();
        startAutoUpdate();
      }, 200);
    });

    // 初始启动定时更新
    startAutoUpdate();

    // 初始加载主页
    navigate(HOME_URL);
  </script>
</body>
</html>
