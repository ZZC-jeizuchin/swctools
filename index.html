  <script>
  (function() {
    const token = localStorage.getItem('swc_token');
    let needLogin = true;

    if (token) {
      try {
        const parts = token.split('.');
        if (parts.length === 3) {
          // 使用安全 Base64URL 解码，支持中文用户名
          const payload = JSON.parse(decodeURIComponent(escape(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')))));
          if (payload.exp && payload.exp < Math.floor(Date.now() / 1000)) {
            needLogin = true;   // 过期了需要重新登录
          } else {
            needLogin = false;  // 有效 token，已登录
          }
        }
      } catch (e) {
        needLogin = true;
      }
    }

    // 未登录时，进行机器人检测
    if (needLogin) {
      const notRobot = localStorage.getItem('not_robot');
      if (notRobot !== '1') {
        // 没有标记或标记为0，立即跳转到反爬虫页面
        window.location.href = 'antirobot.html';
      } else {
        // 标记为1，将其重置为0，下次再访问时需重新验证
        localStorage.setItem('not_robot', '0');
      }
    }
    // 已登录用户什么都不需要做，直接放行
  })();
  </script>

      fpsDisplay.textContent = `FPS: ${Math.round(frameCount * 1000 / (now - lastFpsUpdate))}`;
      frameCount = 0; lastFpsUpdate = now;
    }
    rafId = requestAnimationFrame(fpsLoop);
  }
  function startFPS() { if (!rafId) rafId = requestAnimationFrame(fpsLoop); }
  function stopFPS() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

    if (!url) return;

    if (!final.includes(':')) final = 'https://' + final;
    if (addTimestamp) final += (final.includes('?') ? '&' : '?') + '_t=' + Date.now();
    window.location.href = final;
  }

  const loginBtn = document.getElementById('loginBtn');
  let currentUser = null;

  function getUsernameFromToken() {
    const token = localStorage.getItem('swc_token');
    if (!token) return null;
    try {
      const parts = token.split('.');
      if (parts.length !== 3) return null;
      const payload = JSON.parse(decodeURIComponent(escape(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')))));
      if (payload.exp && payload.exp < Math.floor(Date.now() / 1000)) return null;
      return payload.sub;
    } catch { return null; }
  }

  async function loadUserAvatar() {
    const avatar = document.getElementById('userAvatar');
    const token = localStorage.getItem('swc_token');
    const defaultSrc = 'data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==';
  
    if (!token) {
      avatar.src = defaultSrc;
      return;
    }
 
    const username = getUsernameFromToken();
    if (!username) {
      avatar.src = defaultSrc;
      return;
    }

    try {
      // 带上用户名参数，确保后端返回该用户的专属头像
      const res = await fetch(`/api/upload-icon?username=${encodeURIComponent(username)}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const blob = await res.blob();
        avatar.src = URL.createObjectURL(blob);
      } else {
        avatar.src = defaultSrc;
      }
    } catch {
      avatar.src = defaultSrc;
    }
  }

  (function() {

          const payload = JSON.parse(decodeURIComponent(escape(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')))));
          if (payload.exp && payload.exp < Math.floor(Date.now() / 1000)) {
            needLogin = true;
          } else {
            needLogin = false;
          }
        }
      } catch (e) {
        needLogin = true;
      }
    }

  function recalcModalWidth() {
    const card = modalSlides.children[0];
    if (!card) return;
    const margin = parseFloat(getComputedStyle(card).marginLeft) || window.innerWidth * 0.05;
    cachedModalSlideWidth = card.offsetWidth + margin * 2;
    modalCenteringOffset = Math.max(0, (window.innerWidth - cachedModalSlideWidth) / 2);
  }

  function showOnlyCurrentModalCard(index) {
    const cards = modalSlides.children;
    for (let i = 0; i < cards.length; i++) cards[i].classList.toggle('hidden-card', i !== index);

  function buildModalSlides() {
    modalSlides.innerHTML = categories.map(cat => {
      if (cat === 'login') {
        return buildLoginCard();
      } else {
        return `
          <div class="modal-card" data-cat="${cat}">
            <div class="modal-header"><h3>${catNames[cat]}</h3><button class="modal-close" data-close-modal>&times;</button></div>
            <div class="link-grid">${linkDB[cat].map(l => `<a class="link-item" href="${l.url}" target="_blank" rel="noopener">${l.name}</a>`).join('')}</div>
          </div>`;
      }
    }).join('');

    modalSlides.querySelectorAll('[data-close-modal]').forEach(btn => {
      btn.addEventListener('click', (e) => { e.preventDefault(); closeModal(); });
      btn.addEventListener('touchend', (e) => { e.preventDefault(); closeModal(); });
    });

    const authLoginBtn = document.getElementById('authLoginBtn');
    const authRegisterBtn = document.getElementById('authRegisterBtn');
    const authMsg = document.getElementById('authMsg');
    const adminLoginCheckbox = document.getElementById('adminLoginCheckbox');
    const changePwdBtn = document.getElementById('changePwdBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const deleteAccountBtn = document.getElementById('deleteAccountBtn');

    if (authLoginBtn) {
      authLoginBtn.addEventListener('click', async () => {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value;
        const adminPass = document.getElementById('authAdminPass').value;
        const isAdminLogin = adminLoginCheckbox && adminLoginCheckbox.checked;

        if (!username) { authMsg.textContent = '请输入用户名'; return; }
        if (!isAdminLogin && !password) { authMsg.textContent = '请输入密码'; return; }
        if (isAdminLogin && !adminPass) { authMsg.textContent = '管理员登录需要管理员密码'; return; }

        const body = { username, password: isAdminLogin ? undefined : password, adminPass };
        if (isAdminLogin) delete body.password;

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const data = await res.json();
          if (!res.ok) { authMsg.textContent = data.error || '登录失败'; return; }
          localStorage.setItem('swc_token', data.token);
          updateLoginButton();
          buildModalSlides();
          recalcModalWidth();
          snapModalToIndex(currentCatIndex);
        } catch(e) { authMsg.textContent = '网络错误'; }
      });
    }

    if (authRegisterBtn) {
      authRegisterBtn.addEventListener('click', async () => {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value;
        const adminPass = document.getElementById('authAdminPass').value;
        if (!username || !password || !adminPass) { authMsg.textContent = '请填写所有字段'; return; }
        try {
          const res = await fetch('/api/auth/register', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, adminPass })
          });
          const data = await res.json();
          if (!res.ok) { authMsg.textContent = data.error || '注册失败'; return; }
          localStorage.setItem('swc_token', data.token);
          updateLoginButton();
          buildModalSlides();
          recalcModalWidth();
          snapModalToIndex(currentCatIndex);
        } catch(e) { authMsg.textContent = '网络错误'; }
      });
    }

    if (changePwdBtn) {
      changePwdBtn.addEventListener('click', async () => {
        const newPassword = prompt('请输入新密码：');
        if (!newPassword) return;
        const token = localStorage.getItem('swc_token');
        try {
          const res = await fetch('/api/auth/change-password', {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ newPassword })
          });
          const data = await res.json();
          if (res.ok) { alert('修改成功'); } else { alert('修改失败：' + (data.error || '未知错误')); }
        } catch { alert('网络错误'); }
      });
    }

    if (logoutBtn) {
      logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('swc_token');
        updateLoginButton();
        buildModalSlides();
        recalcModalWidth();
        snapModalToIndex(currentCatIndex);
      });

    if (deleteAccountBtn) {
      deleteAccountBtn.addEventListener('click', async () => {

        const token = localStorage.getItem('swc_token');

  function translateToIndex(index, extraDelta = 0) {
    modalSlides.style.transform = `translateX(${-index * cachedModalSlideWidth + modalCenteringOffset + extraDelta}px)`;
  }

  function snapModalToIndex(index) {
    modalSlides.style.transition = '';
    translateToIndex(index, 0);
    currentCatIndex = index;
    showOnlyCurrentModalCard(index);
    for (let card of modalSlides.children) { card.style.transform = ''; card.style.filter = ''; }
  }

  modalOverlay.addEventListener('touchstart', (e) => {
    if (e.target.closest('[data-close-modal]')) return;
    if (modalSlides.children.length === 0) return;
    modalStartX = e.touches[0].clientX; modalCurrentX = modalStartX; isModalDragging = true;
    lastModalTime = performance.now(); lastModalX = modalStartX;
    modalSlides.style.transition = 'none';
    for (let card of modalSlides.children) card.classList.remove('hidden-card');
  });

  modalOverlay.addEventListener('touchmove', (e) => {
    if(!isModalDragging || cachedModalSlideWidth === 0) return;
    const now = performance.now();
    const currentX = e.touches[0].clientX;
    const deltaTime = now - lastModalTime;
    const deltaX = currentX - modalStartX;
    const absDeltaX = Math.abs(currentX - lastModalX);
    const speed = deltaTime > 0 ? absDeltaX / deltaTime : 0;
    const distance = Math.abs(deltaX);

    translateToIndex(currentCatIndex, deltaX);
    modalCurrentX = currentX;

    const card = modalSlides.children[currentCatIndex];
    if (card) {
      const scale = Math.max(0.8, 1 - Math.min(distance / 150, 1) * 0.2);
      card.style.transform = `scale(${scale})`;
      const blurPx = Math.min(4, speed * 4);
      card.style.filter = `blur(${blurPx}px)`;
    }
    lastModalTime = now;
    lastModalX = currentX;
  });

  modalOverlay.addEventListener('touchend', (e) => {
    if(!isModalDragging) return; isModalDragging = false;
    const delta = modalCurrentX - modalStartX, threshold = 60;
    if (Math.abs(delta) < 5) {
      const el = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      if (!el || !el.closest('.modal-card')) { closeModal(); return; }
    }
    let newIndex = currentCatIndex;
    if (delta < -threshold && currentCatIndex < categories.length - 1) newIndex = currentCatIndex + 1;
    else if (delta > threshold && currentCatIndex > 0) newIndex = currentCatIndex - 1;
    snapModalToIndex(newIndex);
  });

  modalOverlay.addEventListener('click', (e) => { if (!e.target.closest('.modal-card')) closeModal(); });

  function openModalAt(index) {
    if(!modalSlides.children.length) buildModalSlides();
    recalcModalWidth();
    currentCatIndex = index;
    modalSlides.style.transition = 'none';
    translateToIndex(index, 0);
    modalSlides.offsetHeight;
    modalSlides.style.transition = '';
    showOnlyCurrentModalCard(index);
    modalOverlay.classList.add('show');
    document.body.style.overflow = 'hidden';
    for (let card of modalSlides.children) { card.style.transform = ''; card.style.filter = ''; }
  }
  function closeModal() { modalOverlay.classList.remove('show'); document.body.style.overflow = ''; }

  window.addEventListener('orientationchange', () => {
    if (modalOverlay.classList.contains('show')) setTimeout(() => { recalcModalWidth(); translateToIndex(currentCatIndex, 0); showOnlyCurrentModalCard(currentCatIndex); }, 100);
  });
  window.addEventListener('resize', () => {
    if (modalOverlay.classList.contains('show')) { recalcModalWidth(); translateToIndex(currentCatIndex, 0); showOnlyCurrentModalCard(currentCatIndex); }
  });

  document.querySelectorAll('[data-cat]').forEach((btn, idx) => btn.addEventListener('click', ()=> openModalAt(idx)));
  loginBtn.addEventListener('click', () => {
    buildModalSlides();
    openModalAt(5);
  });

  // ========== 抽屉系统 ==========
  const drawerOverlay = document.getElementById('drawerOverlay'), drawerSlides = document.getElementById('drawerSlides');
  let currentDrawerIndex = 0, drawerStartX = 0, drawerCurrentX = 0, drawerStartY = 0, drawerCurrentY = 0, isDrawerDragging = false;
  let cachedDrawerPanelWidth = 0;
  let isVerticalDrag = false;
  const drawerTitles = { device: '设备信息', ide: 'SwCIDE', stress: '压力测试', base64: '翻译&编译' };
  const drawerRendered = { device: false, ide: false, stress: false, base64: false };

  function closeDrawer() { drawerOverlay.classList.remove('show'); document.body.style.overflow = ''; }

  function openDrawerAt(index) {
    if(!drawerSlides.children.length) buildDrawerSlides();
    const panel = drawerSlides.children[0];
    if (panel && cachedDrawerPanelWidth === 0) cachedDrawerPanelWidth = panel.offsetWidth;
    currentDrawerIndex = index;
    drawerSlides.style.transition = 'none';
    updateDrawerSlidePosition(-index * cachedDrawerPanelWidth);
    drawerSlides.offsetHeight;
    drawerSlides.style.transition = '';
    drawerOverlay.classList.add('show');
    document.body.style.overflow = 'hidden';
    const type = drawerTypes[index];
    if(!drawerRendered[type]) {
      if(type === 'device') renderDevice();
      else if(type === 'ide') renderSwCIDE();
      else if(type === 'stress') renderStress();
      else if(type === 'base64') renderBase64();
      drawerRendered[type] = true;
    }
    for (let p of drawerSlides.children) { p.style.transform = ''; p.style.filter = ''; }
  }

  function buildDrawerSlides() {
    drawerSlides.innerHTML = drawerTypes.map(type => `
      <div class="drawer-panel" data-drawer="${type}">
        <div class="drawer-header"><h3>${drawerTitles[type]}</h3><button class="drawer-close-btn" data-close-drawer>&times;</button></div>
        <div class="drawer-content" id="drawer-${type}"></div>
      </div>`).join('');
    drawerSlides.querySelectorAll('[data-close-drawer]').forEach(btn => btn.onclick = closeDrawer);
  }

  function updateDrawerSlidePosition(offset) { drawerSlides.style.transform = `translateX(${offset}px)`; }
  function snapDrawerToIndex(index) {
    drawerSlides.style.transition = '';
    updateDrawerSlidePosition(-index * cachedDrawerPanelWidth);
    currentDrawerIndex = index;
    const type = drawerTypes[index];
    if(!drawerRendered[type]) {
      if(type === 'device') renderDevice();
      else if(type === 'ide') renderSwCIDE();
      else if(type === 'stress') renderStress();
      else if(type === 'base64') renderBase64();
      drawerRendered[type] = true;
    }
    for (let p of drawerSlides.children) { p.style.transform = ''; p.style.filter = ''; }
  }

  drawerOverlay.addEventListener('touchstart', (e) => {
    drawerStartX = e.touches[0].clientX; drawerStartY = e.touches[0].clientY;
    drawerCurrentX = drawerStartX; drawerCurrentY = drawerStartY;
    isDrawerDragging = true;
    isVerticalDrag = false;
    drawerSlides.style.transition = 'none';
    const panel = drawerSlides.children[currentDrawerIndex];
    if (panel) {
      panel.style.transform = '';
      panel.style.filter = '';
    }
  });

  drawerOverlay.addEventListener('touchmove', (e) => {
    if(!isDrawerDragging || cachedDrawerPanelWidth === 0) return;
    const currentX = e.touches[0].clientX, currentY = e.touches[0].clientY;
    const deltaX = currentX - drawerStartX;
    const deltaY = currentY - drawerStartY;
    const distanceX = Math.abs(deltaX);
    const distanceY = Math.abs(deltaY);

    if (distanceY > distanceX) {
      if (deltaY > 0) {
        isVerticalDrag = true;
        const panel = drawerSlides.children[currentDrawerIndex];
        if (panel) {
          panel.style.transform = `translateY(${deltaY}px) scale(1)`;
          panel.style.filter = 'blur(0)';
        }
      } else {
        isVerticalDrag = false;
      }
    } else {
      isVerticalDrag = false;
      const panel = drawerSlides.children[currentDrawerIndex];
      if (panel) {
        panel.style.transform = 'translateY(0) scale(1)';
        panel.style.filter = 'blur(0)';
      }
      updateDrawerSlidePosition(-currentDrawerIndex * cachedDrawerPanelWidth + deltaX);
      drawerCurrentX = currentX;
      if (panel) {
        const scale = Math.max(0.8, 1 - Math.min(distanceX / 150, 1) * 0.2);
        panel.style.transform = `translateY(0) scale(${scale})`;
        const blurPx = Math.min(4, (distanceX / 150) * 4);
        panel.style.filter = `blur(${blurPx}px)`;
      }
    }
    drawerCurrentY = currentY;
  });

  drawerOverlay.addEventListener('touchend', () => {
    if(!isDrawerDragging) return; isDrawerDragging = false;
    const deltaX = drawerCurrentX - drawerStartX, deltaY = drawerCurrentY - drawerStartY;
    const threshold = 60;
    const panel = drawerSlides.children[currentDrawerIndex];

    if (isVerticalDrag) {
      if (deltaY > threshold) {
        closeDrawer();
        return;
      } else {
        if (panel) {
          panel.style.transition = 'transform 0.2s ease';
          panel.style.transform = 'translateY(0)';
          setTimeout(() => { panel.style.transition = ''; }, 200);
        }
      }
      isVerticalDrag = false;
      return;
    }

    if (Math.abs(deltaY) > Math.abs(deltaX) && deltaY > threshold) {
      const contentEl = document.getElementById('drawer-' + drawerTypes[currentDrawerIndex]);
      if (!contentEl || contentEl.scrollTop <= 0) {
        closeDrawer();
        return;
      }
    }
    let newIndex = currentDrawerIndex;
    if (deltaX < -threshold && currentDrawerIndex < drawerTypes.length - 1) newIndex = currentDrawerIndex + 1;
    else if (deltaX > threshold && currentDrawerIndex > 0) newIndex = currentDrawerIndex - 1;
    snapDrawerToIndex(newIndex);
  });

  drawerOverlay.addEventListener('click', (e) => { if (!e.target.closest('.drawer-panel')) closeDrawer(); });

  document.getElementById('showDeviceInfoBtn').addEventListener('click', ()=> openDrawerAt(0));
  document.getElementById('showIdeBtn').addEventListener('click', ()=> openDrawerAt(1));
  document.getElementById('showStressBtn').addEventListener('click', ()=> openDrawerAt(2));
  document.getElementById('showBase64Btn').addEventListener('click', ()=> openDrawerAt(3));

  function renderSwCIDE() {
    const container = document.getElementById('drawer-ide');
    container.innerHTML = `
      <button class="nav-btn" onclick="location.href='ide.html'">HTML IDE</button>
      <button class="nav-btn" onclick="location.href='py.html'">Python IDE</button>
      <button class="nav-btn" onclick="location.href='cpp.html'">C++ IDE</button>
      <button class="nav-btn" onclick="location.href='guide.html'">网站指南</button>
      <button class="nav-btn" onclick="location.href='read.html'">阅读代码</button>
      <button class="nav-btn" onclick="location.href='rgba.html'">RGBA编译</button>
      <button class="nav-btn" onclick="location.href='topvpn.html'">VPN</button>
    `;
  }

  function renderStress() {
    document.getElementById('drawer-stress').innerHTML = `
      <button class="nav-btn" onclick="location.href='cpustress.html'">CPU 压力测试</button>
      <button class="nav-btn" onclick="location.href='gpustress.html'">GPU 压力测试</button>
      <button class="nav-btn" onclick="location.href='stress.html'">三烤 (CPU + GPU + RAM)</button>
      <button class="nav-btn" onclick="location.href='memorystress.html'">内存压力测试</button>`;
  }

  async function getRealPlatform() { return navigator.platform; }
  async function getBatteryInfo() { if(!navigator.getBattery) return '不支持'; const b = await navigator.getBattery(); return `${Math.round(b.level*100)}% ${b.charging ? '充电中' : '使用中'}`; }
  function getGPUInfo() { try { const canvas = document.createElement('canvas'); const gl = canvas.getContext('webgl')||canvas.getContext('experimental-webgl'); if(!gl) return 'WebGL不支持'; const ext = gl.getExtension('WEBGL_debug_renderer_info'); if(!ext) return '扩展不可用'; return gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)||'未知'; } catch { return '获取失败'; } }
  async function getIPInfo() { let local='获取中...', pub='获取中...'; try { const pc = new RTCPeerConnection(); pc.createDataChannel(''); await pc.setLocalDescription(await pc.createOffer()); local = await new Promise(r=>{ pc.onicecandidate=e=>{ if(e.candidate){ let m=e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/); if(m) r(m[0]); } else r('未检测到'); }; setTimeout(()=>r('超时'),2000); }); } catch { local='不可用'; } try { const r=await fetch('https://api.ipify.org?format=json'); const d=await r.json(); pub=d.ip; } catch { pub='获取失败'; } return { local, pub }; }
  async function renderDevice() {
    const container = document.getElementById('drawer-device'); if(!container) return;
    container.innerHTML = `<div class="loading-placeholder"><div class="loading-spinner"></div>正在获取设备信息...</div>`;
    const platform = await getRealPlatform(), battery = await getBatteryInfo(), gpu = getGPUInfo(), ip = await getIPInfo();
    container.innerHTML = `
      <div class="device-grid-2x2">
        <div class="device-item"><div class="device-label">系统架构</div><div class="device-value">${platform}</div></div>
        <div class="device-item"><div class="device-label">电池状态</div><div class="device-value">${battery}</div></div>
        <div class="device-item"><div class="device-label">GPU</div><div class="device-value">${gpu}</div></div>
        <div class="device-item"><div class="device-label">IP 地址</div><div class="device-value">公网：${ip.pub}<br>本地：${ip.local}</div></div>
      </div>
      <div class="drawer-footer-link"><button class="nav-btn" onclick="location.href='device.html'">查看完整设备信息</button>
      <button class="nav-btn" onclick="location.href='checkkv.html'">查看KV云端存储</button>
      <button class="nav-btn" onclick="location.href='checkls.html'">管理localstorage存储</button></div>`;
  }

  function singleByteBase64(byte) { const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/"; return chars[(byte >> 2) & 0x3F] + chars[((byte & 0x03) << 4) & 0x3F] + "=="; }
  function charToDisplay(code) { if (code >= 32 && code <= 126) return String.fromCharCode(code); switch (code) { case 0: return '\\0'; case 8: return '\\b'; case 9: return '\\t'; case 10: return '\\n'; case 11: return '\\v'; case 12: return '\\f'; case 13: return '\\r'; default: return '\\x' + code.toString(16).toUpperCase().padStart(2, '0'); } }
  function buildBase64Table() {
    let html = '<div class="table-wrapper"><table class="base64-table"><thead><tr>';
    for (let c = 0; c < 4; c++) html += `<th>Chr ${c*32}-${c*32+31}</th><th>Base64</th>`;
    html += '</tr></thead><tbody>';
    for (let row = 0; row < 32; row++) { html += '<tr>'; for (let col = 0; col < 4; col++) { const code = col * 32 + row; html += `<td>${charToDisplay(code)}</td><td>${singleByteBase64(code)}</td>`; } html += '</tr>'; }
    html += '</tbody></table></div>'; return html;
  }
  function renderBase64() { document.getElementById('drawer-base64').innerHTML = `<button class="nav-btn" onclick="location.href='translation.html'">文本翻译</button><button class="nav-btn" onclick="location.href='tb64.html'">完整Base64编译</button>${buildBase64Table()}`; }

  (function() {
    const titleH1 = document.querySelector('.title-section h1'), badgeEl = document.querySelector('.badge');
    let clickCount = 0, unlocked = false;
    titleH1.addEventListener('click', () => {
      if (unlocked) return;
      clickCount++;
      if (clickCount >= 5) { unlocked = true; badgeEl.textContent = 'Administrator '; badgeEl.style.cursor = 'pointer'; badgeEl.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = 'admin.html'; }); }
    });
    document.addEventListener('click', (e) => { if (!unlocked && !titleH1.contains(e.target)) clickCount = 0; });
  })();

  buildModalSlides();
})();
</script>
</body>
</html>
