<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      const token = localStorage.getItem('swc_token');
      let needLogin = true;
      if (token) {
        try {
          const parts = token.split('.');
          if (parts.length === 3) {
            const payload = JSON.parse(decodeURIComponent(escape(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')))));
            if (payload.exp && payload.exp < Math.floor(Date.now() / 1000)) {
              needLogin = true;
            } else {
              needLogin = false;
            }
          }
        } catch (e) {
          needLogin = true;
        }
      }
      if (needLogin) {
        const notRobot = localStorage.getItem('not_robot');
        if (notRobot !== '1') {
          window.location.href = 'antirobot.html';
        } else {
          localStorage.setItem('not_robot', '0');
        }
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>SwC IDE · HTML 编辑器</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <link rel="stylesheet" href="swc-ide.css">
  <style>
    /* 主面板不允许滚动，内部子面板自行滚动 */
    .main-panel {
      overflow: hidden !important;
      display: flex !important;
      flex-direction: column !important;
    }
    /* 所有可见面板均等分配空间 */
    .editor-container,
    .preview-container,
    .output-container {
      flex: 1 1 0;
      min-height: 0;
      display: none;
      position: relative; /* 为内部绝对定位提供参考 */
    }
    .editor-container {
      display: block; /* 默认显示编辑器 */
    }
    .preview-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    [data-theme="dark"] .preview-container iframe {
      background: #0a0f14;
    }

    /* 输出面板内部绝对定位 */
    #outputViewport {
      position: absolute; top:0; left:0; right:0; bottom:0;
      overflow-y: auto; padding: 16px; box-sizing: border-box;
    }
    #outputViewport::-webkit-scrollbar { width: 30px; height: 30px; }
    #outputViewport::-webkit-scrollbar-track { background: rgba(128,128,128,0.08); border-radius: 6px; }
    #outputViewport::-webkit-scrollbar-thumb {
      background: var(--panel-border); border-radius: 6px;
      border: 6px solid transparent; background-clip: content-box; min-height: 40px;
    }
    #outputViewport::-webkit-scrollbar-thumb:hover { background: var(--btn-border); }
    #outputCanvas {
      white-space: pre-wrap; word-break: break-word;
      color: var(--text-color); background: transparent;
    }

    /* 拖拽分隔条 */
    .splitter {
      flex: 0 0 8px;
      background: var(--panel-border);
      cursor: row-resize;
      position: relative;
      z-index: 10;
    }
    .splitter:hover {
      background: var(--btn-border);
    }

    /* 编辑器需要自适应高度 */
    .CodeMirror {
      height: 100% !important;
    }
  </style>
</head>
<body>
<div class="corner-tl">不自由毋宁死 · 不自由毋寧死 · Give me liberty or give me death · 自由か、死か</div>
<div class="corner-tr" id="fpsDisplay">FPS: --</div>
<div class="corner-br">made by ZZC-jeizuchin, Github</div>
<button class="theme-toggle" id="themeToggle">深色</button>

<div class="main-panel">
  <div class="header"><h1>SwC IDE · HTML 版</h1><a href="index.html" class="back-btn">← 返回主站</a></div>

  <div class="file-area" id="fileArea">
    <select class="file-select" id="localFileSelect"><option value="">-- 本地存储文件 --</option></select>
    <button class="file-btn" id="localOpenBtn" disabled>打开</button>
    <button class="file-btn danger" id="localDeleteBtn" disabled>删除</button>
    <button class="file-btn" id="saveAsBtn">另存为…</button>
    <button class="file-btn" id="saveCurrentBtn">保存当前</button>
    <input type="file" id="diskFileInput" accept=".html,.htm,.txt" style="display:none;">
    <button class="file-btn" id="diskOpenBtn">打开本地文件</button>
    <button class="file-btn" id="uploadCloudBtn" title="需先登录">上传所有本地文件</button>
    <button class="file-btn" id="downloadCloudBtn" title="需先登录">下载云端文件</button>
    <span class="current-file" id="currentFileName">未命名</span>
  </div>

  <div class="tab-bar">
    <div class="tabs">
      <button class="tab active" data-tab="editor">编辑器</button>
      <button class="tab" data-tab="preview">预览</button>
      <button class="tab" data-tab="output">输出</button>
    </div>
  </div>

  <div class="editor-container" id="editorContainer">
    <textarea id="htmlCode" style="display:none;"></textarea>
  </div>

  <!-- 分隔条 (仅当编辑器与预览/输出共存时显示) -->
  <div class="splitter" id="splitter" title="拖动调整高度"></div>

  <div class="preview-container" id="previewContainer">
    <iframe id="previewFrame" sandbox="allow-scripts" title="预览"></iframe>
  </div>

  <div class="output-container" id="outputContainer" style="display:none;">
    <div id="outputViewport">
      <div id="outputSpacer"></div>
      <div id="outputCanvas"></div>
    </div>
  </div>

  <div class="action-bar">
    <button class="nav-btn" id="runBtn">运行并预览</button>
    <button class="nav-btn secondary" id="saveBtn">保存当前代码</button>
    <button class="nav-btn secondary" id="resetBtn">重置为默认</button>
    <span class="status" id="statusMsg"></span>
  </div>
</div>

<script>
(function() {
  "use strict";

  // ========== 正式日志输出 ==========
  function nowTime() {
    const d = new Date();
    return d.toTimeString().split(' ')[0];
  }

  const outputViewport = document.getElementById('outputViewport');
  const outputCanvas = document.getElementById('outputCanvas');
  const outputSpacer = document.getElementById('outputSpacer');
  const outputContainer = document.getElementById('outputContainer');
  const outputLines = [];
  let outputScrolledUp = false;

  function appendOutput(text) {
    outputLines.push(text);
    outputSpacer.style.height = (outputLines.length * 21) + 'px';
    const visible = outputLines.slice(-200);
    outputCanvas.textContent = visible.join('\n');
    outputCanvas.style.transform = `translateY(${Math.max(0, outputLines.length - 200) * 21}px)`;
    if (!outputScrolledUp) {
      outputViewport.scrollTop = outputViewport.scrollHeight;
    }
  }

  outputViewport.addEventListener('scroll', () => {
    const atBottom = outputViewport.scrollTop + outputViewport.clientHeight >= outputViewport.scrollHeight - 10;
    outputScrolledUp = !atBottom;
  });

  function log(level, message) {
    const time = nowTime();
    const prefix = {
      info:    ' INFO',
      warn:    ' WARN',
      error:   'ERROR',
      success: '   OK',
      net:     '  NET'
    }[level] || '     ';
    appendOutput(`[${time}] [${prefix}] ${message}`);
  }

  // ========== 主题 ==========
  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle) {
    const currentTheme = localStorage.getItem('swc_theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.textContent = currentTheme === 'light' ? '深色' : '亮色';
    themeToggle.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('swc_theme', next);
      themeToggle.textContent = next === 'light' ? '深色' : '亮色';
      editor.refresh();
    });
  }

  // ========== FPS ==========
  const fpsDisplay = document.getElementById('fpsDisplay');
  if (fpsDisplay) {
    let frameCount = 0, lastFpsUpdate = performance.now();
    (function updateFPS() {
      frameCount++;
      const now = performance.now();
      if (now - lastFpsUpdate >= 1000) {
        fpsDisplay.textContent = `FPS: ${Math.round(frameCount * 1000 / (now - lastFpsUpdate))}`;
        frameCount = 0; lastFpsUpdate = now;
      }
      requestAnimationFrame(updateFPS);
    })();
  }

  // ========== 编辑器 ==========
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  const VOID_TAGS = new Set(['area','base','br','col','command','embed','hr','img','input','keygen','link','meta','param','source','track','wbr']);
  const DEFAULT_CODE = `<!DOCTYPE html>\n<html>\n<head>\n  <meta charset="UTF-8">\n  <title>新页面</title>\n  <style>\n    body { font-family: sans-serif; padding: 20px; background: #f0f4f8; }\n    h1 { color: #1e4b6e; }\n  </style>\n</head>\n<body>\n  <h1>Hello, SwC!</h1>\n  <p>开始编辑你的 HTML 吧～</p>\n</body>\n</html>`;

  const textarea = document.getElementById('htmlCode');
  const editorContainer = document.getElementById('editorContainer');
  const editor = CodeMirror.fromTextArea(textarea, {
    mode: 'htmlmixed', theme: 'default', lineNumbers: true,
    autoCloseTags: true, autoCloseBrackets: true, matchTags: { bothTags: true },
    indentUnit: 4, tabSize: 4, indentWithTabs: false, smartIndent: true, lineWrapping: true,
    styleActiveLine: true,
    gutters: ['CodeMirror-linenumbers'],
    inputStyle: isMobile ? 'textarea' : 'contenteditable',
    extraKeys: {
      'Enter': function(cm) {
        const cursor = cm.getCursor(), line = cm.getLine(cursor.line), ch = cursor.ch;
        if(ch > 0 && line.charAt(ch-1) === '>') {
          const before = line.substring(0, ch), tag = before.match(/<(\w+)(?:\s[^>]*)?>$/);
          if(tag && !VOID_TAGS.has(tag[1].toLowerCase())) {
            const indent = line.match(/^\s*/)[0], inner = indent + '    ';
            cm.replaceSelection('\n' + inner + '\n' + indent + '</' + tag[1] + '>');
            cm.setCursor({ line: cursor.line+1, ch: inner.length }); return;
          }
        }
        cm.execCommand('newlineAndIndent');
      }
    }
  });

  editor.on('beforeChange', (cm, change) => {
    if (change.origin === '+input' && change.text.length === 1 && change.text[0] === '<') {
      change.cancel();
      const cursor = cm.getCursor();
      cm.replaceRange('<>', cursor, cursor);
      cm.setCursor({ line: cursor.line, ch: cursor.ch + 1 });
    }
  });

  function resizeEditor() {
    if (editorContainer.style.display === 'none') return;
    const height = editorContainer.clientHeight;
    if (height > 0) {
      editor.getWrapperElement().style.height = height + 'px';
      editor.refresh();
    }
  }
  setTimeout(resizeEditor, 50);
  window.addEventListener('resize', resizeEditor);

  // ========== 预览 (Blob URL) ==========
  const previewFrame = document.getElementById('previewFrame');
  const previewContainer = document.getElementById('previewContainer');

  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'console') {
      const method = e.data.method || 'log';
      const args = JSON.parse(e.data.args || '[]');
      const formatted = args.map(a => {
        if (a === undefined) return 'undefined';
        if (a === null) return 'null';
        try { return JSON.stringify(a); } catch { return String(a); }
      }).join(' ');
      log('info', `[iframe ${method}] ${formatted}`);
    }
  });

  function injectConsoleCapture(code) {
    const captureScript = `<script>
(function(){
  const _console = {};
  ['log','warn','error','info'].forEach(function(m){
    _console[m] = console[m];
    console[m] = function(){
      var args = Array.prototype.slice.call(arguments);
      try {
        parent.postMessage({
          type: 'console',
          method: m,
          args: JSON.stringify(args.map(function(a){
            try { return JSON.stringify(a); } catch(e) { return String(a); }
          }))
        }, '*');
      } catch(e) {}
      _console[m].apply(console, args);
    };
  });
})();
<\/script>`;
    return code.replace(/<head>/i, '<head>' + captureScript);
  }

  function updatePreview() {
    let rawCode = editor.getValue();
    if (!rawCode || rawCode.trim() === '') rawCode = DEFAULT_CODE;
    rawCode = injectConsoleCapture(rawCode);
    const blob = new Blob([rawCode], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    previewFrame.onload = () => URL.revokeObjectURL(url);
    previewFrame.src = url;
  }

  // ========== 标签切换与布局控制 ==========
  const tabs = document.querySelectorAll('.tab');
  const splitter = document.getElementById('splitter');
  let splitPercent = 50; // 编辑器占高度百分比

  function applySplit() {
    const mainPanel = document.querySelector('.main-panel');
    const availableHeight = mainPanel.clientHeight - (splitter.offsetHeight || 8);
    const editorHeight = Math.floor(availableHeight * splitPercent / 100);
    editorContainer.style.flex = '0 0 ' + editorHeight + 'px';
    const rest = availableHeight - editorHeight;
    if (previewContainer.style.display !== 'none') {
      previewContainer.style.flex = '1 1 0';
      outputContainer.style.flex = '0 0 0';
    } else if (outputContainer.style.display !== 'none') {
      outputContainer.style.flex = '1 1 0';
      previewContainer.style.flex = '0 0 0';
    } else {
      // 两个都隐藏？仅编辑器显示时给编辑器全部高度
      editorContainer.style.flex = '1 1 0';
      previewContainer.style.flex = '0 0 0';
      outputContainer.style.flex = '0 0 0';
      return;
    }
    resizeEditor();
  }

  function switchTab(target) {
    tabs.forEach(b => b.classList.remove('active'));
    const activeTab = document.querySelector(`.tab[data-tab="${target}"]`);
    if (activeTab) activeTab.classList.add('active');

    editorContainer.style.display = 'none';
    previewContainer.style.display = 'none';
    outputContainer.style.display = 'none';

    if (target === 'editor') {
      editorContainer.style.display = 'block';
      // 隐藏预览和输出，但依然显示编辑器并占满
    } else if (target === 'preview') {
      editorContainer.style.display = 'block';
      previewContainer.style.display = 'block';
      updatePreview();
    } else if (target === 'output') {
      editorContainer.style.display = 'block';
      outputContainer.style.display = 'block';
      if (!outputScrolledUp) outputViewport.scrollTop = outputViewport.scrollHeight;
    }
    applySplit();
  }

  tabs.forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

  // 拖拽分隔条
  (function initSplitter() {
    let dragging = false;
    let startY = 0;
    let startHeight = 0;

    function onMouseDown(e) {
      e.preventDefault();
      dragging = true;
      startY = e.clientY;
      startHeight = editorContainer.clientHeight;
      document.body.style.cursor = 'row-resize';
      document.body.style.userSelect = 'none';
    }

    function onMouseMove(e) {
      if (!dragging) return;
      const delta = e.clientY - startY;
      const newHeight = startHeight + delta;
      const mainPanel = document.querySelector('.main-panel');
      const maxHeight = mainPanel.clientHeight - splitter.offsetHeight;
      const clamped = Math.max(80, Math.min(newHeight, maxHeight - 80));
      splitPercent = Math.round((clamped / (mainPanel.clientHeight - splitter.offsetHeight)) * 100);
      applySplit();
    }

    function onMouseUp() {
      dragging = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }

    splitter.addEventListener('mousedown', onMouseDown);
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
    // 触摸支持
    splitter.addEventListener('touchstart', (e) => {
      e.preventDefault();
      dragging = true;
      startY = e.touches[0].clientY;
      startHeight = editorContainer.clientHeight;
    });
    document.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      const delta = e.touches[0].clientY - startY;
      const newHeight = startHeight + delta;
      const mainPanel = document.querySelector('.main-panel');
      const maxHeight = mainPanel.clientHeight - splitter.offsetHeight;
      const clamped = Math.max(80, Math.min(newHeight, maxHeight - 80));
      splitPercent = Math.round((clamped / (mainPanel.clientHeight - splitter.offsetHeight)) * 100);
      applySplit();
    });
    document.addEventListener('touchend', () => { dragging = false; });
  })();

  // ========== 文件管理 ==========
  const FILE_PREFIX = 'swc_file_html_';
  const FILE_LIST_KEY = 'swc_filelist_html';
  const CURRENT_FILE_KEY = 'swc_current_html_file';
  let currentFile = localStorage.getItem(CURRENT_FILE_KEY) || '';

  function sanitizeFilename(name) {
    return name.replace(/[^a-zA-Z0-9_\-\u4e00-\u9fff]/g, '').substring(0, 60);
  }
  function getFullFilename(baseName) {
    const sanitized = sanitizeFilename(baseName);
    return sanitized + (sanitized.endsWith('.html') ? '' : '.html');
  }
  function getFileList() {
    try { return JSON.parse(localStorage.getItem(FILE_LIST_KEY) || '[]'); } catch { return []; }
  }
  function saveFileList(list) {
    localStorage.setItem(FILE_LIST_KEY, JSON.stringify(list));
  }
  function refreshFileSelect() {
    const select = document.getElementById('localFileSelect');
    if (!select) return;
    const files = getFileList();
    select.innerHTML = '<option value="">-- 本地存储文件 --</option>';
    files.forEach(f => {
      const opt = document.createElement('option'); opt.value = f; opt.textContent = f; select.appendChild(opt);
    });
    const openBtn = document.getElementById('localOpenBtn');
    const delBtn = document.getElementById('localDeleteBtn');
    if (openBtn) openBtn.disabled = files.length === 0;
    if (delBtn) delBtn.disabled = files.length === 0;
    const cf = document.getElementById('currentFileName');
    if (cf) cf.textContent = currentFile || '未命名';
  }
  function setEditorContent(code, filename) {
    editor.setValue(code);
    editor.clearHistory();
    currentFile = filename;
    localStorage.setItem(CURRENT_FILE_KEY, filename);
    const cf = document.getElementById('currentFileName');
    if (cf) cf.textContent = filename || '未命名';
    localStorage.setItem('swc_standalone_html_code', code);
  }
  function localSave(filename, code) {
    const full = getFullFilename(filename);
    const files = getFileList();
    if (!files.includes(full)) { files.push(full); saveFileList(files); }
    localStorage.setItem(FILE_PREFIX + full, code);
    refreshFileSelect();
    return full;
  }
  function localDelete(filename) {
    localStorage.removeItem(FILE_PREFIX + filename);
    const files = getFileList().filter(f => f !== filename);
    saveFileList(files);
    if (currentFile === filename) { currentFile = ''; localStorage.removeItem(CURRENT_FILE_KEY); }
    refreshFileSelect();
  }

  document.getElementById('saveAsBtn').addEventListener('click', () => {
    const name = prompt('请输入文件名（自动添加 .html）：', currentFile.replace('.html', '') || '');
    if (!name) return;
    const full = getFullFilename(name);
    if (getFileList().includes(full)) { if (!confirm(`文件 ${full} 已存在，是否覆盖？`)) return; }
    const saved = localSave(name, editor.getValue());
    currentFile = saved; localStorage.setItem(CURRENT_FILE_KEY, saved);
    document.getElementById('currentFileName').textContent = saved;
    log('success', '文件已保存: ' + saved);
  });
  document.getElementById('saveCurrentBtn').addEventListener('click', () => {
    if (currentFile) {
      localStorage.setItem(FILE_PREFIX + currentFile, editor.getValue());
      const files = getFileList();
      if (!files.includes(currentFile)) { files.push(currentFile); saveFileList(files); refreshFileSelect(); }
      log('success', '文件已保存: ' + currentFile);
    } else {
      document.getElementById('saveAsBtn').click();
    }
  });
  document.getElementById('localOpenBtn').addEventListener('click', () => {
    const filename = document.getElementById('localFileSelect').value;
    if (!filename) return;
    const code = localStorage.getItem(FILE_PREFIX + filename);
    if (code !== null) { setEditorContent(code, filename); log('info', '已打开: ' + filename); }
  });
  document.getElementById('localDeleteBtn').addEventListener('click', () => {
    const filename = document.getElementById('localFileSelect').value;
    if (!filename || !confirm(`确定删除 ${filename}？`)) return;
    localDelete(filename);
    log('info', '已删除: ' + filename);
  });
  document.getElementById('diskOpenBtn').addEventListener('click', () => { document.getElementById('diskFileInput').click(); });
  document.getElementById('diskFileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { setEditorContent(reader.result, file.name); log('info', '已从磁盘加载: ' + file.name); };
    reader.readAsText(file);
    e.target.value = '';
  });
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); document.getElementById('saveCurrentBtn').click(); }
  });

  // ========== 运行/保存/重置按钮 ==========
  document.getElementById('runBtn').addEventListener('click', () => {
    log('info', '正在运行并预览...');
    try {
      localStorage.setItem('swc_standalone_html_code', editor.getValue());
      updatePreview();
      switchTab('preview');
      log('success', '预览已更新');
    } catch (err) {
      log('error', '运行失败: ' + err.message);
    }
  });
  document.getElementById('saveBtn').addEventListener('click', () => {
    localStorage.setItem('swc_standalone_html_code', editor.getValue());
    log('success', '代码已保存');
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    editor.setValue(DEFAULT_CODE);
    updatePreview();
    log('info', '已重置为默认代码');
  });

  // ========== 云端同步 ==========
  const CODE_TYPE = 'html';
  const UPLOAD_BTN = document.getElementById('uploadCloudBtn');
  const DOWNLOAD_BTN = document.getElementById('downloadCloudBtn');
  function getToken() { return localStorage.getItem('swc_token') || ''; }
  function tokenIsValid() {
    const token = getToken();
    if (!token) return false;
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      return payload.exp * 1000 > Date.now();
    } catch { return false; }
  }
  function updateCloudButtons() {
    if (!UPLOAD_BTN || !DOWNLOAD_BTN) return;
    const loggedIn = tokenIsValid();
    UPLOAD_BTN.disabled = !loggedIn;
    DOWNLOAD_BTN.disabled = !loggedIn;
    UPLOAD_BTN.title = loggedIn ? '上传所有本地文件至云端' : '需要登录才能上传';
    DOWNLOAD_BTN.title = loggedIn ? '从云端下载并覆盖/创建本地文件' : '需要登录才能下载';
  }
  updateCloudButtons();

  UPLOAD_BTN.addEventListener('click', async () => {
    const token = getToken();
    if (!token) { log('error', '请先登录'); return; }
    const files = {};
    getFileList().forEach(f => { const c = localStorage.getItem(FILE_PREFIX + f); if (c) files[f] = c; });
    if (Object.keys(files).length === 0) { log('warn', '本地没有可上传的文件'); return; }
    try {
      const resp = await fetch('/api/code/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ type: CODE_TYPE, files })
      });
      if (resp.status === 401) { log('error', '登录已过期，请重新登录'); return; }
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        log('error', `上传失败: ${err.error || resp.statusText}`);
        return;
      }
      const data = await resp.json();
      log('success', `已上传 ${data.count} 个文件至云端`);
    } catch(e) { log('error', '网络错误，上传失败'); }
  });

  DOWNLOAD_BTN.addEventListener('click', async () => {
    const token = getToken();
    if (!token) { log('error', '请先登录'); return; }
    try {
      const resp = await fetch(`/api/code/load?type=${CODE_TYPE}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (resp.status === 401) { log('error', '登录已过期，请重新登录'); return; }
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        log('error', `下载失败: ${err.error || resp.statusText}`);
        return;
      }
      const data = await resp.json();
      if (!data.files || Object.keys(data.files).length === 0) { log('info', '云端暂无文件'); return; }
      if (!confirm(`将从云端下载 ${Object.keys(data.files).length} 个文件，覆盖本地同名文件并创建新文件，继续？`)) return;
      const files = data.files;
      const existing = getFileList();
      for (const fname of Object.keys(files)) {
        localStorage.setItem(FILE_PREFIX + fname, files[fname]);
        if (!existing.includes(fname)) existing.push(fname);
      }
      saveFileList(existing);
      refreshFileSelect();
      log('success', `已同步 ${Object.keys(files).length} 个文件`);
    } catch(e) { log('error', '网络错误，下载失败'); }
  });
  window.addEventListener('storage', updateCloudButtons);

  // ========== 初始化 ==========
  function loadCode() {
    const saved = localStorage.getItem('swc_standalone_html_code') || DEFAULT_CODE;
    editor.setValue(saved);
    updatePreview();
  }
  loadCode();
  refreshFileSelect();
  switchTab('editor');
})();
</script>
</body>
</html>
